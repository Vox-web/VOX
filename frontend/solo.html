<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX — Переводчик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f2f7;
            --text: #2d2640;
            --text2: #7a7189;
            --text-soft: #8c829c;
            --text-soft2: #6f6680;
            --muted: #6e667d;
            --surface: #ffffff;
            --surface2: #edeaf3;
            --surface3: #f7f5fb;
            --border: #ddd6e8;
            --border-strong: #cdbfe0;
            --accent: #7c6aff;
            --accent-soft: #7c6aff;
            --accent-soft2: #6f58ff;
            --accent-bg: #efeaff;
            --accent-dim: rgba(124, 106, 255, 0.10);
            --accent-glow-soft: rgba(124, 106, 255, 0.15);
            --accent-glow: rgba(124, 106, 255, 0.30);
            --success: #2ecc71;
            --warning: #f0a500;
            --danger: #e74c3c;
            --danger-soft: #ff6b6b;
            --white: #ffffff;
            --nav-bg: rgba(255,255,255,0.88);
        }

        :root[data-theme="dark"] {
            --bg: #0a0a0f;
            --text: #e0e0e0;
            --text2: #9a95a7;
            --text-soft: #888888;
            --text-soft2: #777777;
            --muted: #666666;
            --surface: #111118;
            --surface2: #1a1a24;
            --surface3: #0d0d14;
            --border: #1e1e2a;
            --border-strong: #333333;
            --accent: #7c6aff;
            --accent-soft: #c4b5ff;
            --accent-soft2: #b0a0ff;
            --accent-bg: #2a1a4a;
            --accent-dim: rgba(124, 106, 255, 0.12);
            --accent-glow-soft: rgba(124, 106, 255, 0.15);
            --accent-glow: rgba(124, 106, 255, 0.30);
            --success: #44ff44;
            --warning: #ffa500;
            --danger: #ff4444;
            --danger-soft: #ff6666;
            --white: #ffffff;
            --nav-bg: rgba(20,20,29,0.86);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- Заголовок --- */
        .header {
            text-align: center;
            padding: 16px 0 8px;
            position: relative;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 4px;
        }
        .header .subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* --- UI Language Switcher --- */
        .ui-lang-switcher {
            position: absolute;
            top: 14px;
            right: 0;
            display: flex;
            background: var(--surface);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
            border: 1px solid var(--border);
        }
        .ui-lang-btn {
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        .ui-lang-btn:hover {
            color: var(--text);
        }
        .ui-lang-btn.active {
            color: var(--text);
            background: var(--accent-dim);
            box-shadow: 0 0 8px var(--accent-glow-soft);
        }

        .theme-toggle-btn {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .theme-toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* --- Статус --- */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--warning); }
        .status-dot.listening { background: var(--success); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* --- Выбор языка --- */
        .lang-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
        }
        .lang-selector label {
            font-size: 13px;
            color: var(--text-soft);
            transition: opacity 0.25s;
        }
        .lang-selector select {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }
        .lang-selector select:focus {
            border-color: var(--accent);
        }


        .lang-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
        }
        .lang-pair {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: end;
        }
        .lang-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .lang-field label {
            font-size: 13px;
            color: var(--text-soft);
            transition: opacity 0.25s;
        }
        .lang-field select {
            width: 100%;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }
        .lang-field select:focus {
            border-color: var(--accent);
        }
        .swap-btn {
            height: 42px;
            min-width: 42px;
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--surface2);
            color: var(--accent-soft);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swap-btn:hover {
            border-color: var(--accent);
            color: var(--white);
            background: var(--accent-bg);
        }
        .history-actions {
            display: flex;
            justify-content: flex-end;
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .history-btn {
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--surface2);
            color: var(--text);
            font-size: 13px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-btn:hover {
            border-color: var(--accent);
            color: var(--white);
        }

        /* --- Mic selector --- */
        .mic-selector {
            display: flex; align-items: center; gap: 8px;
            padding: 0 12px;
        }
        .mic-selector label {
            font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0;
        }
        .mic-selector select {
            flex: 1; min-width: 0;
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 10px; font-size: 13px; outline: none; cursor: pointer;
        }
        .mic-selector select:focus { border-color: var(--accent); }
        .mic-selector .mic-refresh-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text2);
            font-size: 15px; padding: 6px 8px; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .mic-selector .mic-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        /* Mic hint */
        .mic-hint-btn {
            background: none; border: none; cursor: pointer;
            font-size: 14px; color: var(--text2); padding: 0 2px;
            flex-shrink: 0; line-height: 1; transition: color 0.2s;
        }
        .mic-hint-btn:hover { color: var(--accent); }
        .mic-hint-box {
            display: none; margin: 4px 12px 0;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 13px;
            font-size: 12px; color: var(--text2); line-height: 1.6;
        }
        .mic-hint-box.open { display: block; }

        /* --- TTS toggle --- */
        .tts-toggle-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin: 0 auto;
            background: none; border: 1px solid var(--border);
            border-radius: 99px; padding: 6px 16px;
            font-size: 13px; font-weight: 500; color: var(--text2);
            cursor: pointer; transition: all 0.2s;
        }
        .tts-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tts-toggle-btn.tts-off { border-color: var(--text3); color: var(--text3); opacity: 0.7; }

        /* --- Главная кнопка --- */
        .main-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px auto;
            user-select: none;
        }
        .main-btn:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }
        .main-btn.active {
            border-color: var(--accent);
            background: var(--accent-bg);
            color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .main-btn.active:hover {
            background: var(--surface2);
            border-color: #ff4444;
            color: var(--danger-soft);
            box-shadow: none;
        }

        /* --- Карточки перевода --- */
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            min-height: 60px;
        }
        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
            transition: opacity 0.25s;
        }
        .card-text {
            font-size: 16px;
            line-height: 1.5;
            min-height: 24px;
            word-wrap: break-word;
        }
        .card.translation {
            border-left: 3px solid #7c6aff;
        }
        .card.translation .card-text {
            color: var(--accent-soft);
            font-size: 18px;
        }
        .card.original .card-text {
            color: var(--text-soft);
        }

        /* --- VAD индикатор --- */
        .vad-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 30px;
        }
        .vad-bar {
            width: 3px;
            height: 8px;
            background: var(--border-strong);
            border-radius: 2px;
            transition: height 0.1s, background 0.1s;
        }
        .vad-bar.active {
            background: #7c6aff;
        }

        /* --- История --- */
        .history {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        .history-item {
            background: var(--surface3);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .history-time {
            color: var(--text2);
            font-size: 11px;
            margin-bottom: 4px;
        }
        .history-original {
            color: var(--text-soft2);
        }
        .history-translation {
            color: var(--accent-soft2);
            margin-top: 2px;
        }

        /* --- Разделитель --- */
        .divider {
            height: 1px;
            background: var(--surface2);
            margin: 4px 0;
        }

        /* --- Прелоадер --- */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 13px;
        }

        /* --- i18n fade transition --- */
        .i18n-fade {
            transition: opacity 0.25s ease;
        }
        .i18n-fade.fading {
            opacity: 0;
        }

        /* ======== FIXED TOP NAV ======== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            height: 52px;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 1px 8px rgba(100,80,160,0.07);
        }
        .top-nav-logo {
            font-size: 20px; font-weight: 700; color: var(--accent);
            letter-spacing: 4px; font-family: -apple-system, sans-serif;
            text-decoration: none;
        }
        .top-nav-right {
            display: flex; align-items: center; gap: 8px;
        }
        .top-nav-btn {
            display: flex; align-items: center; gap: 5px;
            text-decoration: none; color: var(--text2);
            font-size: 13px; font-weight: 500;
            background: var(--surface2); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 9px;
            transition: all 0.2s; white-space: nowrap;
        }
        .top-nav-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
        .top-nav-btn.review-btn { background: rgba(240,165,0,0.10); border-color: rgba(240,165,0,0.3); color: #c47f00; }
        .top-nav-btn.review-btn:hover { background: rgba(240,165,0,0.18); }

        /* Push content below fixed nav */
        .container { padding-top: calc(52px + 16px) !important; }

        /* Hide old floating buttons */
        .review-fab { display: none !important; }

        @media (max-width: 400px) {
            .top-nav-btn span.nav-label { display: none; }
            .top-nav-btn { padding: 6px 9px; }
        }
    </style>
</head>

    // --- Очередь аудио для воспроизведения ---
    // Используем Audio() вместо AudioContext чтобы не конфликтовать с
    // capture AudioContext и не ломать маршрутизацию на Android.
    let audioQueue = [];
    let currentAudio = null;
    let currentAudioUrl = null;
    let isPlaying = false;

    // =====================================================================
    // WebSocket
    // =====================================================================
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/ws/solo`;

        ws = new WebSocket(url);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'config',
                source_lang: sourceLangSelect.value,
                target_lang: langSelect.value,
                tts_enabled: _ttsEnabled,
            }));
            setStatus('connected', 'connected');
            console.log('WebSocket connected');
        };

        ws.onclose = () => {
            // Не перезаписуємо статус якщо юзер сам натиснув Stop
            if (isListening) {
                setStatus('disconnected', 'disconnected_init');
                setTimeout(connectWebSocket, 2000);
            }
            console.log('WebSocket closed');
        };

        ws.onerror = (e) => {
            console.error('WebSocket error:', e);
            setStatus('disconnected', 'error');
        };

        ws.onmessage = (event) => {
            if (event.data instanceof ArrayBuffer) {
                handleAudioMessage(event.data);
            } else {
                handleJsonMessage(JSON.parse(event.data));
            }
        };
    }

    function handleJsonMessage(msg) {
        if (msg.type === 'transcript') {
            originalText.textContent = msg.text || '—';
            if (msg.language) {
                originalText.title = t('langTooltip') !== undefined
                    ? UI_STRINGS[currentUILang].langTooltip(msg.language, Math.round(msg.confidence * 100))
                    : `${msg.language} (${Math.round(msg.confidence * 100)}%)`;
            }
        }
        else if (msg.type === 'translation') {
            translationText.textContent = msg.text || '—';
            addToHistory(originalText.textContent, msg.text, msg.lang_from, msg.lang_to);
        }
    }

    // ======== TTS TOGGLE ========
    let _ttsEnabled = localStorage.getItem('vox_tts_enabled') !== 'false';

    function _updateTtsBtn() {
        const btn  = document.getElementById('ttsToggleBtn');
        const icon = document.getElementById('ttsToggleIcon');
        const lbl  = document.getElementById('ttsToggleLabel');
        if (!btn) return;
        icon.textContent = _ttsEnabled ? '🔊' : '🔇';
        lbl.textContent  = t(_ttsEnabled ? 'ttsOn' : 'ttsOff');
        btn.classList.toggle('tts-off', !_ttsEnabled);
    }

    function toggleTts() {
        _ttsEnabled = !_ttsEnabled;
        localStorage.setItem('vox_tts_enabled', _ttsEnabled);
        // Повідомляємо сервер — він пропустить синтез TTS якщо вимкнено
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'config', tts_enabled: _ttsEnabled }));
        }
        // Якщо вимкнули — зупиняємо поточне відтворення і чистимо чергу
        if (!_ttsEnabled) {
            audioQueue.length = 0;
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
            isPlaying = false;
        }
        _updateTtsBtn();
    }

    // Init TTS button
    _updateTtsBtn();

    function handleAudioMessage(data) {
        const prefix = new TextDecoder().decode(new Uint8Array(data, 0, 6));
        if (prefix === 'AUDIO:') {
            if (!_ttsEnabled) return; // TTS вимкнено — не відтворюємо
            const audioData = data.slice(6);
            playAudio(audioData);
        }
    }

    // =====================================================================
    // Воспроизведение аудио (TTS)
    // =====================================================================
    async function playAudio(mp3Bytes) {
        audioQueue.push(mp3Bytes);
        if (!isPlaying) {
            processAudioQueue();
        }
    }

    function processAudioQueue() {
        if (audioQueue.length === 0) {
            isPlaying = false;
            currentAudio = null;
            currentAudioUrl = null;
            return;
        }

        isPlaying = true;
        const mp3Bytes = audioQueue.shift();

        try {
            const blob = new Blob([mp3Bytes], { type: 'audio/mpeg' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            currentAudio = audio;
            currentAudioUrl = url;

            audio.onended = () => {
                URL.revokeObjectURL(url);
                currentAudioUrl = null;
                processAudioQueue();
            };
            audio.onerror = () => {
                URL.revokeObjectURL(url);
                currentAudioUrl = null;
                processAudioQueue();
            };
            bindAudioOutput(audio).finally(() => {
                audio.play().catch(e => {
                    console.warn('Audio play failed:', e);
                    URL.revokeObjectURL(url);
                    currentAudioUrl = null;
                    processAudioQueue();
                });
            });
        } catch (e) {
            console.error('Audio playback error:', e);
            processAudioQueue();
        }
    }

    // =====================================================================
    // Захват микрофона (AudioWorklet)
    // =====================================================================
    async function startMicrophone() {
        try {
            const micConstraints = {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
            };
            if (_selectedMicId) micConstraints.deviceId = { exact: _selectedMicId };

            // Спробуємо з вибраним deviceId; якщо пристрій зник — fallback на default
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints });
            } catch(devErr) {
                if (_selectedMicId && (devErr.name === 'OverconstrainedError' || devErr.name === 'NotFoundError')) {
                    console.warn('Selected mic unavailable, falling back to default:', devErr.message);
                    _selectedMicId = '';
                    localStorage.removeItem('vox_mic_id');
                    // Оновити select щоб показав "За замовчуванням"
                    const sel = document.getElementById('micDeviceSelect');
                    if (sel) sel.value = '';
                    delete micConstraints.deviceId;
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints });
                } else {
                    throw devErr;
                }
            }

            audioContext = new AudioContext({ sampleRate: 16000 });

            const workletCode = `
                class VoxProcessor extends AudioWorkletProcessor {
                    constructor() {
                        super();
                        this.buffer = [];
                        this.CHUNK_SIZE = 512;
                    }

                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (!input || !input[0]) return true;

                        const samples = input[0];
                        this.buffer.push(...samples);

                        while (this.buffer.length >= this.CHUNK_SIZE) {
                            const chunk = new Float32Array(this.buffer.splice(0, this.CHUNK_SIZE));
                            this.port.postMessage(chunk.buffer, [chunk.buffer]);
                        }

                        return true;
                    }
                }

                registerProcessor('vox-processor', VoxProcessor);
            `;

            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);

            const source = audioContext.createMediaStreamSource(mediaStream);
            audioWorkletNode = new AudioWorkletNode(audioContext, 'vox-processor');

            audioWorkletNode.port.onmessage = (event) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data);
                }
                const chunk = new Float32Array(event.data);
                animateVAD(chunk);
            };

            source.connect(audioWorkletNode);
            // NOTE: audioWorkletNode НЕ подключается к destination —
            // он только захватывает PCM и отправляет на сервер через WebSocket.
            // Подключение к destination создаёт аудио-петлю и ломает
            // маршрутизацию звука на Android (режим VOICE_COMMUNICATION).

        } catch (e) {
            console.error('Microphone error:', e);
            setStatus('disconnected', 'mic_error');
            isListening = false;
            mainBtn.classList.remove('active');
            mainBtn.textContent = t('btnListen');
        }
    }

    function stopMicrophone() {
        if (audioWorkletNode) {
            audioWorkletNode.disconnect();
            audioWorkletNode = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
    }

    // =====================================================================
    // Управление
    // =====================================================================
    async function toggleListening() {
        if (isListening) {
            isListening = false;
            mainBtn.classList.remove('active');
            mainBtn.textContent = t('btnListen');
            stopMicrophone();
            if (ws) {
                ws.close();
                ws = null;
            }
            // Очищаем очередь и останавливаем текущее воспроизведение
            audioQueue = [];
            isPlaying = false;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = null;
            }
            setStatus('disconnected', 'stopped');
            resetVAD();
        } else {
            isListening = true;
            mainBtn.classList.add('active');
            mainBtn.textContent = t('btnStop');
            setStatus('connected', 'connecting');

            connectWebSocket();

            await new Promise(r => setTimeout(r, 500));
            await startMicrophone();

            if (isListening) {
                setStatus('listening', 'listening');
            }
        }
    }

    // =====================================================================
    // UI утилиты
    // =====================================================================
    function setStatus(state, semanticKey) {
        statusDot.className = 'status-dot ' + state;
        currentStatusKey = semanticKey || state;
        statusText.textContent = t(statusKeyMap[currentStatusKey] || 'statusDisconnected');
    }

    function animateVAD(chunk) {
        let sum = 0;
        for (let i = 0; i < chunk.length; i++) {
            sum += chunk[i] * chunk[i];
        }
        const rms = Math.sqrt(sum / chunk.length);
        const level = Math.min(rms * 10, 1.0);

        vadBars.forEach((bar, i) => {
            const barLevel = Math.random() * level;
            const height = 4 + barLevel * 22;
            bar.style.height = height + 'px';
            bar.classList.toggle('active', level > 0.02);
        });
    }

    function resetVAD() {
        vadBars.forEach(bar => {
            bar.style.height = '8px';
            bar.classList.remove('active');
        });
    }

    async function syncSoloConfig() {
        const payload = {
            source_lang: sourceLangSelect.value,
            target_lang: langSelect.value,
            tts_enabled: _ttsEnabled,
        };

        try {
            await fetch('/set-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
        } catch (e) {
            console.error('Failed to sync config:', e);
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'config',
                ...payload,
            }));
        }
    }

    async function swapLanguages() {
        const prevSource = sourceLangSelect.value;
        sourceLangSelect.value = langSelect.value;
        langSelect.value = prevSource;
        await syncSoloConfig();
    }

                    color: '#2d1b69'
                }
            }
        };

        const filename = `vox-solo-history-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.pdf`;
        pdfMake.createPdf(docDefinition).download(filename);
    }

    function addToHistory(original, translation, langFrom, langTo) {
        const now = new Date();
        const time = now.toLocaleTimeString(currentUILang === 'de' ? 'de-DE' : currentUILang === 'en' ? 'en-GB' : 'uk-UA', { hour: '2-digit', minute: '2-digit' });

        soloFullHistory.push({
            time,
            original,
            translation,
            langFrom,
            langTo,
        });

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="history-time">${time}</div>
            <div class="history-original">${escapeHtml(original)}</div>
            <div class="history-translation">${escapeHtml(translation)}</div>
        `;

        history.insertBefore(item, history.firstChild);

        while (history.children.length > 20) {
            history.removeChild(history.lastChild);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // --- Смена языков ---
    langSelect.addEventListener('change', syncSoloConfig);
    sourceLangSelect.addEventListener('change', syncSoloConfig);

    // --- Инициализация ---
    applyUILanguage(false);
    console.log('VOX Solo v0.1.0');

    // ======== AUDIO DEVICE SELECTORS ========
    let _selectedMicId = localStorage.getItem('vox_mic_id') || '';
    let _selectedOutputId = localStorage.getItem('vox_output_id') || '';

    function hybridSupported() {
        return typeof HTMLMediaElement !== 'undefined'
            && typeof HTMLMediaElement.prototype.setSinkId === 'function';
    }

    function outputPickerSupported() {
        return !!(navigator.mediaDevices && navigator.mediaDevices.selectAudioOutput);
    }

    function updateHybridStatus(mode) {
        const el = document.getElementById('hybridModeStatus');
        if (!el) return;
        if (!hybridSupported()) {
            el.textContent = t('hybridUnsupported');
            return;
        }
        if (mode === 'fallback') {
            el.textContent = t('hybridFallback');
            return;
        }
        el.textContent = _selectedOutputId ? t('hybridSelected') : t('hybridReady');
    }

    async function populateMicDevices() {
        try {
            // Перевіряємо чи дозвіл вже є через Permissions API
            // Якщо ні — запитуємо один раз щоб labels були видимі
            let needsRequest = true;
            if (navigator.permissions) {
                try {
                    const perm = await navigator.permissions.query({ name: 'microphone' });
                    needsRequest = perm.state !== 'granted';
                } catch(_) { /* Permissions API not supported */ }
            }
            if (needsRequest) {
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null);
                if (tempStream) tempStream.getTracks().forEach(t => t.stop());
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');
            const sel = document.getElementById('micDeviceSelect');
            if (!sel) return;

            const saved = _selectedMicId;
            sel.innerHTML = `<option value="">${t('micDefault')}</option>`;
            mics.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = d.label || `${t('micUnknown')} ${i + 1}`;
                opt.selected = d.deviceId === saved;
                sel.appendChild(opt);
            });

            // Підписи
            const micLbl = document.getElementById('micSelectorLabel');
            const micRefBtn = document.querySelector('.mic-refresh-btn');
            if (micLbl) micLbl.textContent = t('micLabel');
            if (micRefBtn) micRefBtn.title = t('micRefreshTitle');
        } catch(e) {
            console.warn('populateMicDevices failed:', e);
        }
    }

    async function populateOutputDevices() {
        try {
            const sel = document.getElementById('audioOutputSelect');
            if (!sel) return;

            const devices = await navigator.mediaDevices.enumerateDevices();
            const outs = devices.filter(d => d.kind === 'audiooutput');
            const saved = _selectedOutputId;
            sel.innerHTML = `<option value="">${t('outputDefault')}</option>`;
            outs.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = d.label || `${t('outputUnknown')} ${i + 1}`;
                opt.selected = d.deviceId === saved;
                sel.appendChild(opt);
            });

            const outLbl = document.getElementById('outputSelectorLabel');
            const outPickerBtn = document.getElementById('outputPickerBtn');
            const refreshBtns = document.querySelectorAll('.mic-refresh-btn');
            if (outLbl) outLbl.textContent = t('outputLabel');
            if (outPickerBtn) outPickerBtn.title = t('outputPickerTitle');
            if (refreshBtns[1]) refreshBtns[1].title = t('outputRefreshTitle');
            updateHybridStatus();
        } catch(e) {
            console.warn('populateOutputDevices failed:', e);
            updateHybridStatus('fallback');
        }
    }

    function onMicDeviceChange(deviceId) {
        _selectedMicId = deviceId;
        localStorage.setItem('vox_mic_id', deviceId);
    }

    function onOutputDeviceChange(deviceId) {
        _selectedOutputId = deviceId || '';
        localStorage.setItem('vox_output_id', _selectedOutputId);
        updateHybridStatus();
    }

    async function requestOutputDevice() {
        if (!outputPickerSupported()) {
            updateHybridStatus('fallback');
            return;
        }
        try {
            const info = await navigator.mediaDevices.selectAudioOutput();
            if (info?.deviceId) {
                _selectedOutputId = info.deviceId;
                localStorage.setItem('vox_output_id', _selectedOutputId);
                const sel = document.getElementById('audioOutputSelect');
                if (sel) sel.value = _selectedOutputId;
            }
            updateHybridStatus();
        } catch(e) {
            console.warn('selectAudioOutput failed:', e);
            updateHybridStatus('fallback');
        }
    }

    async function bindAudioOutput(audioEl) {
        if (!audioEl || !_selectedOutputId || !hybridSupported()) return;
        try {
            await audioEl.setSinkId(_selectedOutputId);
        } catch(e) {
            console.warn('setSinkId failed:', e);
            updateHybridStatus('fallback');
        }
    }

    function toggleMicHint() {
        const box = document.getElementById('micHintBox');
        if (!box) return;
        if (!box.classList.contains('open')) {
            box.textContent = t('micHint');
        }
        box.classList.toggle('open');
    }

    // Заповнити списки при завантаженні та при підключенні нового пристрою
    populateMicDevices();
    populateOutputDevices();
    navigator.mediaDevices.addEventListener('devicechange', async () => {
        await populateMicDevices();
        await populateOutputDevices();
    });

    </script>
</body>
</html>
