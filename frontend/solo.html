<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX — Переводчик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f2f7;
            --text: #2d2640;
            --text2: #7a7189;
            --text-soft: #8c829c;
            --text-soft2: #6f6680;
            --muted: #6e667d;
            --surface: #ffffff;
            --surface2: #edeaf3;
            --surface3: #f7f5fb;
            --border: #ddd6e8;
            --border-strong: #cdbfe0;
            --accent: #7c6aff;
            --accent-soft: #7c6aff;
            --accent-soft2: #6f58ff;
            --accent-bg: #efeaff;
            --accent-dim: rgba(124, 106, 255, 0.10);
            --accent-glow-soft: rgba(124, 106, 255, 0.15);
            --accent-glow: rgba(124, 106, 255, 0.30);
            --success: #2ecc71;
            --warning: #f0a500;
            --danger: #e74c3c;
            --danger-soft: #ff6b6b;
            --white: #ffffff;
            --nav-bg: rgba(255,255,255,0.88);
        }

        :root[data-theme="dark"] {
            --bg: #0a0a0f;
            --text: #e0e0e0;
            --text2: #9a95a7;
            --text-soft: #888888;
            --text-soft2: #777777;
            --muted: #666666;
            --surface: #111118;
            --surface2: #1a1a24;
            --surface3: #0d0d14;
            --border: #1e1e2a;
            --border-strong: #333333;
            --accent: #7c6aff;
            --accent-soft: #c4b5ff;
            --accent-soft2: #b0a0ff;
            --accent-bg: #2a1a4a;
            --accent-dim: rgba(124, 106, 255, 0.12);
            --accent-glow-soft: rgba(124, 106, 255, 0.15);
            --accent-glow: rgba(124, 106, 255, 0.30);
            --success: #44ff44;
            --warning: #ffa500;
            --danger: #ff4444;
            --danger-soft: #ff6666;
            --white: #ffffff;
            --nav-bg: rgba(20,20,29,0.86);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- Заголовок --- */
        .header {
            text-align: center;
            padding: 16px 0 8px;
            position: relative;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 4px;
        }
        .header .subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* --- UI Language Switcher --- */
        .ui-lang-switcher {
            position: absolute;
            top: 14px;
            right: 0;
            display: flex;
            background: var(--surface);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
            border: 1px solid var(--border);
        }
        .ui-lang-btn {
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        .ui-lang-btn:hover {
            color: var(--text);
        }
        .ui-lang-btn.active {
            color: var(--text);
            background: var(--accent-dim);
            box-shadow: 0 0 8px var(--accent-glow-soft);
        }

        .theme-toggle-btn {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .theme-toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* --- Статус --- */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--warning); }
        .status-dot.listening { background: var(--success); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* --- Выбор языка --- */
        .lang-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
        }
        .lang-selector label {
            font-size: 13px;
            color: var(--text-soft);
            transition: opacity 0.25s;
        }
        .lang-selector select {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }
        .lang-selector select:focus {
            border-color: var(--accent);
        }


        .lang-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
        }
        .lang-pair {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: end;
        }
        .lang-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .lang-field label {
            font-size: 13px;
            color: var(--text-soft);
            transition: opacity 0.25s;
        }
        .lang-field select {
            width: 100%;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }
        .lang-field select:focus {
            border-color: var(--accent);
        }
        .swap-btn {
            height: 42px;
            min-width: 42px;
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--surface2);
            color: var(--accent-soft);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swap-btn:hover {
            border-color: var(--accent);
            color: var(--white);
            background: var(--accent-bg);
        }
        .history-actions {
            display: flex;
            justify-content: flex-end;
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .history-btn {
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--surface2);
            color: var(--text);
            font-size: 13px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-btn:hover {
            border-color: var(--accent);
            color: var(--white);
        }

        /* --- Mic selector --- */
        .mic-selector {
            display: flex; align-items: center; gap: 8px;
            padding: 0 12px;
        }
        .mic-selector label {
            font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0;
        }
        .mic-selector select {
            flex: 1; min-width: 0;
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 10px; font-size: 13px; outline: none; cursor: pointer;
        }
        .mic-selector select:focus { border-color: var(--accent); }
        .mic-selector .mic-refresh-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text2);
            font-size: 15px; padding: 6px 8px; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .mic-selector .mic-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        /* Mic hint */
        .mic-hint-btn {
            background: none; border: none; cursor: pointer;
            font-size: 14px; color: var(--text2); padding: 0 2px;
            flex-shrink: 0; line-height: 1; transition: color 0.2s;
        }
        .mic-hint-btn:hover { color: var(--accent); }
        .mic-hint-box {
            display: none; margin: 4px 12px 0;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 13px;
            font-size: 12px; color: var(--text2); line-height: 1.6;
        }
        .mic-hint-box.open { display: block; }

        /* --- TTS toggle --- */
        .tts-toggle-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin: 0 auto;
            background: none; border: 1px solid var(--border);
            border-radius: 99px; padding: 6px 16px;
            font-size: 13px; font-weight: 500; color: var(--text2);
            cursor: pointer; transition: all 0.2s;
        }
        .tts-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tts-toggle-btn.tts-off { border-color: var(--text3); color: var(--text3); opacity: 0.7; }

        /* --- Speaker selector --- */
        .speaker-selector {
            display: flex; align-items: center; gap: 8px;
            padding: 0 12px;
        }
        .speaker-selector label {
            font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0;
        }
        .speaker-selector select {
            flex: 1; min-width: 0;
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 10px; font-size: 13px; outline: none; cursor: pointer;
        }
        .speaker-selector select:focus { border-color: var(--accent); }
        .speaker-selector .spk-refresh-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text2);
            font-size: 15px; padding: 6px 8px; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .speaker-selector .spk-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        .speaker-no-support {
            font-size: 11px; color: var(--text2); padding: 2px 12px;
            display: none; text-align: center;
        }

        /* --- Hybrid mic mode toggle --- */
        .hybrid-toggle-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin: 0 auto;
            background: none; border: 1px solid var(--border);
            border-radius: 99px; padding: 6px 16px;
            font-size: 13px; font-weight: 500; color: var(--text2);
            cursor: pointer; transition: all 0.2s;
        }
        .hybrid-toggle-btn:hover { border-color: var(--success); color: var(--success); }
        .hybrid-toggle-btn.hybrid-on {
            border-color: var(--success); color: var(--success);
            background: rgba(46,204,113,0.08);
        }
        .hybrid-toggle-btn.hybrid-warn {
            border-color: var(--warning); color: var(--warning);
            background: rgba(240,165,0,0.08);
        }

        /* --- Главная кнопка --- */
        .main-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px auto;
            user-select: none;
        }
        .main-btn:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }
        .main-btn.active {
            border-color: var(--accent);
            background: var(--accent-bg);
            color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .main-btn.active:hover {
            background: var(--surface2);
            border-color: #ff4444;
            color: var(--danger-soft);
            box-shadow: none;
        }

        /* --- Карточки перевода --- */
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            min-height: 60px;
        }
        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
            transition: opacity 0.25s;
        }
        .card-text {
            font-size: 16px;
            line-height: 1.5;
            min-height: 24px;
            word-wrap: break-word;
        }
        .card-text:empty::before {
            content: attr(data-placeholder);
            opacity: 0.45;
            font-style: italic;
            font-size: 14px;
        }
        .card.translation {
            border-left: 3px solid #7c6aff;
        }
        .card.translation .card-text {
            color: var(--accent-soft);
            font-size: 18px;
        }
        .card.original .card-text {
            color: var(--text-soft);
        }

        /* --- VAD индикатор --- */
        .vad-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 30px;
        }
        .vad-bar {
            width: 3px;
            height: 8px;
            background: var(--border-strong);
            border-radius: 2px;
            opacity: 0.35;
            transition: height 0.1s, background 0.1s, opacity 0.2s;
        }
        .vad-bar.active {
            background: #7c6aff;
            opacity: 1;
        }

        /* --- История --- */
        .history {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        .history:empty::before {
            content: attr(data-placeholder);
            display: block;
            text-align: center;
            padding: 24px 12px;
            color: var(--text2);
            font-size: 13px;
            font-style: italic;
            opacity: 0.7;
        }
        .history-actions:has(+ .history:empty) { display: none; }
        .history-item {
            background: var(--surface3);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .history-time {
            color: var(--text2);
            font-size: 11px;
            margin-bottom: 4px;
        }
        .history-original {
            color: var(--text-soft2);
        }
        .history-translation {
            color: var(--accent-soft2);
            margin-top: 2px;
        }

        /* --- Разделитель --- */
        .divider {
            height: 1px;
            background: var(--surface2);
            margin: 4px 0;
        }

        /* --- Прелоадер --- */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 13px;
        }

        /* --- i18n fade transition --- */
        .i18n-fade {
            transition: opacity 0.25s ease;
        }
        .i18n-fade.fading {
            opacity: 0;
        }

        /* ======== FIXED TOP NAV ======== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            height: 52px;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 1px 8px rgba(100,80,160,0.07);
        }
        .top-nav-logo {
            font-size: 20px; font-weight: 700; color: var(--accent);
            letter-spacing: 4px; font-family: -apple-system, sans-serif;
            text-decoration: none;
        }
        .top-nav-right {
            display: flex; align-items: center; gap: 8px;
        }
        .top-nav-btn {
            display: flex; align-items: center; gap: 5px;
            text-decoration: none; color: var(--text2);
            font-size: 13px; font-weight: 500;
            background: var(--surface2); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 9px;
            transition: all 0.2s; white-space: nowrap;
        }
        .top-nav-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
        .top-nav-btn.review-btn { background: rgba(240,165,0,0.10); border-color: rgba(240,165,0,0.3); color: #c47f00; }
        .top-nav-btn.review-btn:hover { background: rgba(240,165,0,0.18); }

        /* Push content below fixed nav */
        .container { padding-top: calc(52px + 16px) !important; }

        /* Hide old floating buttons */
        .review-fab { display: none !important; }

        @media (max-width: 400px) {
            .top-nav-btn span.nav-label { display: none; }
            .top-nav-btn { padding: 6px 9px; }
        }

        /* === Focus mode (distraction-free recording) === */
        .dim-on-record { transition: opacity 0.4s ease; }
        body.is-recording .dim-on-record { opacity: 0.25; pointer-events: none; }
        body.is-recording .mic-selector.dim-on-record,
        body.is-recording .speaker-selector.dim-on-record,
        body.is-recording .speaker-no-support.dim-on-record { pointer-events: auto; }
        body.is-recording .dim-on-record:hover,
        body.is-recording .dim-on-record:focus-within { opacity: 0.7; pointer-events: auto; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="/landing" class="top-nav-logo">VOX</a>
        <div class="top-nav-right">
            <a href="/review?source=host" class="top-nav-btn review-btn" target="_blank">⭐ <span class="nav-label" id="navReviewLabel">Відгук</span></a>
            <a href="/cabinet" class="top-nav-btn">👤 <span class="nav-label" id="navCabinetLabel">Кабінет</span></a>
            <button class="theme-toggle-btn" id="themeToggleBtn" type="button" onclick="toggleTheme()" aria-label="Switch theme" title="Switch theme">🌙</button>
            <a href="/host" class="top-nav-btn">🏠 <span class="nav-label" id="navBackLabel">Назад</span></a>
        </div>
    </nav>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <div class="subtitle">Real-time AI Translation</div>

            <!-- UI Language Switcher -->
            <div class="ui-lang-switcher">
                <button class="ui-lang-btn active" data-uilang="uk">UA</button>
                <button class="ui-lang-btn" data-uilang="en">EN</button>
                <button class="ui-lang-btn" data-uilang="de">DE</button>
            </div>
        </div>

        <!-- Статус -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText" class="i18n-fade">Не підключено</span>
        </div>

        <!-- Выбор языков -->
        <div class="lang-controls dim-on-record">
            <div class="lang-pair">
                <div class="lang-field">
                    <label class="i18n-fade" id="sourceLangLabel">Мова оригіналу:</label>
                    <select id="sourceLangSelect">
                        <option value="uk">🇺🇦 Українська</option>
                        <option value="ru" selected>🇷🇺 Русский</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="de">🇩🇪 Deutsch</option>
                        <option value="pl">🇵🇱 Polski</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="it">🇮🇹 Italiano</option>
                        <option value="pt">🇧🇷 Português</option>
                        <option value="ja">🇯🇵 日本語</option>
                        <option value="ko">🇰🇷 한국어</option>
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="tr">🇹🇷 Türkçe</option>
                        <option value="hi">🇮🇳 हिन्दी</option>
                    </select>
                </div>

                <button class="swap-btn i18n-fade" id="swapLangBtn" type="button" onclick="swapLanguages()">⇄</button>

                <div class="lang-field">
                    <label class="i18n-fade" id="langLabel">Мова перекладу:</label>
                    <select id="langSelect">
                        <option value="uk" selected>🇺🇦 Українська</option>
                        <option value="ru">🇷🇺 Русский</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="de">🇩🇪 Deutsch</option>
                        <option value="pl">🇵🇱 Polski</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="it">🇮🇹 Italiano</option>
                        <option value="pt">🇧🇷 Português</option>
                        <option value="ja">🇯🇵 日本語</option>
                        <option value="ko">🇰🇷 한국어</option>
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="tr">🇹🇷 Türkçe</option>
                        <option value="hi">🇮🇳 हिन्दी</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Вибір мікрофону -->
        <div class="mic-selector dim-on-record">
            <label id="micSelectorLabel">🎤</label>
            <select id="micDeviceSelect" onchange="onMicDeviceChange(this.value)"></select>
            <button class="mic-hint-btn" id="micHintBtn" onclick="toggleMicHint()" title="?">ⓘ</button>
            <button class="mic-refresh-btn" onclick="populateMicDevices()" title="Оновити список">↺</button>
        </div>
        <div class="mic-hint-box dim-on-record" id="micHintBox"></div>

        <div class="speaker-selector dim-on-record" id="speakerSelectorRow">
            <label id="speakerSelectorLabel">🔊</label>
            <select id="speakerDeviceSelect" onchange="onSpeakerDeviceChange(this.value)"></select>
            <button class="spk-refresh-btn" onclick="populateSpeakerDevices()" title="Refresh">↺</button>
        </div>
        <div class="speaker-no-support dim-on-record" id="speakerNoSupport"></div>

        <!-- VAD індикатор -->
        <div class="vad-indicator" id="vadIndicator">

    // =====================================================================
    // WebSocket
    // =====================================================================
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/ws/solo`;

        ws = new WebSocket(url);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'config',
                source_lang: sourceLangSelect.value,
                target_lang: langSelect.value,
                tts_enabled: _ttsEnabled,
            }));
            setStatus('connected', 'connected');
            console.log('WebSocket connected');
            // Keepalive ping — не даёт Railway proxy убить idle соединение
            clearInterval(_pingInterval);
            _pingInterval = setInterval(() => {
                if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'ping'}));
            }, 15000);
        };

        ws.onclose = () => {
            clearInterval(_pingInterval); _pingInterval = null;
            // Не перезаписуємо статус якщо юзер сам натиснув Stop
            if (isListening) {
                setStatus('disconnected', 'disconnected_init');
                setTimeout(connectWebSocket, 2000);
            }
            console.log('WebSocket closed');
        };

        ws.onerror = (e) => {
            console.error('WebSocket error:', e);
            setStatus('disconnected', 'error');
        };

        ws.onmessage = (event) => {
            if (event.data instanceof ArrayBuffer) {
                handleAudioMessage(event.data);
            } else {
                handleJsonMessage(JSON.parse(event.data));
            }
        };
    }

    function handleJsonMessage(msg) {
        if (msg.type === 'transcript') {
            if (msg.is_final) {
                _lastFinalOriginal = msg.text || '—';
                originalText.textContent = _lastFinalOriginal;
                originalText.style.opacity = msg.commit_final ? '1' : '0.85';
            } else {
                originalText.textContent = '🎤 ' + (msg.text || '');
                originalText.style.opacity = '0.7';
            }
            if (msg.language) {
                originalText.title = t('langTooltip') !== undefined
                    ? UI_STRINGS[currentUILang].langTooltip(msg.language, Math.round(msg.confidence * 100))
                    : `${msg.language} (${Math.round(msg.confidence * 100)}%)`;
            }
        }
        else if (msg.type === 'translation') {
            translationText.textContent = msg.text || '—';
            addToHistory(_lastFinalOriginal, msg.text, msg.lang_from, msg.lang_to);
            // Фраза завершена — сбрасываем оригинал, следующая начнётся чисто
            originalText.textContent = '—';
            originalText.style.opacity = '0.4';
            _lastFinalOriginal = '—';
        }
    }

        // Повідомляємо сервер — він пропустить синтез TTS якщо вимкнено
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'config', tts_enabled: _ttsEnabled }));
        }
        // Якщо вимкнули — зупиняємо поточне відтворення і чистимо чергу
        if (!_ttsEnabled) {
            audioQueue.length = 0;
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
            isPlaying = false;
        }
        _updateTtsBtn();
    }

        if (!_hybridMode) {

            lbl.textContent = t('hybridWarn');

            lbl.textContent = t('hybridOn');

    async function _findBuiltInMicId() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');

            const rank = s => {
                const x = (s || '').toLowerCase();
                if (!x) return 0;
                if (/(bluetooth|headset|headphone|buds|airpods|hands-free|handsfree|wireless|usb)/.test(x)) return -10;
                if (/(built-?in|internal|phone|handset|default)/.test(x)) return 5;
                return 1;
            };

            mics.sort((a, b) => rank(b.label) - rank(a.label));
            const best = mics.find(m => rank(m.label) > 1);
            return best?.deviceId || '';
        } catch {
            return '';
        }
    }

    async function toggleHybrid() {
        if (_hybridToggling) return;
        _hybridToggling = true;

        try {
            _hybridMode = !_hybridMode;
            localStorage.setItem('vox_hybrid_mode', _hybridMode ? 'true' : 'false');

            let found = false;
            const sel = document.getElementById('micDeviceSelect');

            if (_hybridMode) {
                const builtIn = await _findBuiltInMicId();
                if (builtIn) {
                    _selectedMicId = builtIn;
                    localStorage.setItem('vox_mic_id', builtIn);
                    if (sel) sel.value = builtIn;
                    found = true;
                } else {
                    _selectedMicId = '';
                    localStorage.removeItem('vox_mic_id');
                    if (sel) sel.value = '';
                }
            } else {
                _selectedMicId = '';
                localStorage.removeItem('vox_mic_id');
                if (sel) sel.value = '';
            }

            _updateHybridBtn(found);

            if (isListening) {
                await toggleListening();
                setTimeout(() => { toggleListening(); }, 150);
            }
        } finally {
            _hybridToggling = false;
        }
    }

    // ======== SPEAKER OUTPUT SELECTOR (setSinkId) ========
    let _selectedSpeakerId = localStorage.getItem('vox_speaker_id') || '';

    function _speakerSupported() {
        return typeof HTMLMediaElement !== 'undefined'
            && typeof HTMLMediaElement.prototype.setSinkId === 'function';
    }

    async function populateSpeakerDevices() {
        const row = document.getElementById('speakerSelectorRow');
        const noSup = document.getElementById('speakerNoSupport');
        const sel = document.getElementById('speakerDeviceSelect');

        if (!row || !noSup || !sel) return;

        if (!_speakerSupported()) {
            row.style.display = 'none';
            noSup.textContent = t('speakerNoSupport');
            noSup.style.display = 'block';
            return;
        }

        row.style.display = '';
        noSup.style.display = 'none';

        try {
            if (typeof navigator.mediaDevices.selectAudioOutput === 'function') {
                try {
                    await navigator.mediaDevices.selectAudioOutput({
                        deviceId: _selectedSpeakerId || undefined
                    });
                } catch (_) {}
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const outs = devices.filter(d => d.kind === 'audiooutput');

            sel.innerHTML = `<option value="">${t('speakerDefault')}</option>`;

            outs.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = d.label || `${t('speakerUnknown')} ${i + 1}`;
                opt.selected = d.deviceId === _selectedSpeakerId;
                sel.appendChild(opt);
            });
        } catch (e) {
            console.warn('populateSpeakerDevices failed:', e);
        }
    }

    function onSpeakerDeviceChange(deviceId) {
        _selectedSpeakerId = deviceId || '';
        localStorage.setItem('vox_speaker_id', _selectedSpeakerId);

        }
    }

    async function _applySinkId(audioEl) {
        if (!audioEl || !_speakerSupported() || !_selectedSpeakerId) return;

        try {
            await audioEl.setSinkId(_selectedSpeakerId);
        } catch (e) {
            console.warn('setSinkId failed:', e);
        }
    }

    function handleAudioMessage(data) {
        const prefix = new TextDecoder().decode(new Uint8Array(data, 0, 6));
        if (prefix === 'AUDIO:') {
            if (!_ttsEnabled) return;
            const audioData = data.slice(6);
            playAudio(audioData);
        }
    }

    // =====================================================================
    // Воспроизведение аудио (TTS)
    // =====================================================================
    async function playAudio(mp3Bytes) {
        audioQueue.push(mp3Bytes);
        if (!isPlaying) {
            processAudioQueue();
        }
    }

    function processAudioQueue() {
        if (audioQueue.length === 0) {
            isPlaying = false;
            currentAudio = null;
            currentAudioUrl = null;

            if (_micPausedForTts) {
                _micPausedForTts = false;

                if (isListening) {
                    startMicrophone()
                        .then(() => {
                            if (isListening) {
                                setStatus('listening', 'listening');
                            }
                        })
                        .catch(e => {
                            console.error('Failed to resume microphone after TTS:', e);
                            setStatus('disconnected', 'mic_error');
                        });
                }
            }

            return;
        }

        isPlaying = true;

        if (isListening && !_micPausedForTts) {
            stopMicrophone();
            _micPausedForTts = true;
        }

        const mp3Bytes = audioQueue.shift();

        try {
            const blob = new Blob([mp3Bytes], { type: 'audio/mpeg' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            currentAudio = audio;
            currentAudioUrl = url;

            audio.onended = () => {
                URL.revokeObjectURL(url);
                currentAudioUrl = null;
                processAudioQueue();
            };

            audio.onerror = () => {
                URL.revokeObjectURL(url);
                currentAudioUrl = null;
                processAudioQueue();
            };

            // Solo semantic mode:
            // ничего не выбрасываем из середины очереди — сервер сам буферизует смысл.
            const backlog = audioQueue.length;

            // Лёгкое ускорение оставляем мягким, чтобы не превращать речь в пулемёт.
            let rate = 1.0;
            if (backlog === 1) rate = 1.06;
            if (backlog >= 2) rate = 1.10;
            if (backlog >= 4) rate = 1.14;
            audio.playbackRate = rate;

            _applySinkId(audio).finally(() => {
                audio.play().catch(e => {
                    console.warn('Audio play failed:', e);
                    URL.revokeObjectURL(url);
                    currentAudioUrl = null;
                    processAudioQueue();
                });
            });
        } catch (e) {
            console.error('Audio playback error:', e);
            processAudioQueue();
        }
    }

    // =====================================================================
    // Захват микрофона (AudioWorklet)
    // =====================================================================
    async function startMicrophone() {
        try {
            const micConstraints = {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: false,
                noiseSuppression: true,
                autoGainControl: true,
            };

            if (!_hybridMode) {
                micConstraints.echoCancellation = true;
                micConstraints.noiseSuppression = true;
                micConstraints.autoGainControl = true;
            }

            if (_selectedMicId) micConstraints.deviceId = { exact: _selectedMicId };

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints });
            } catch (devErr) {
                if (_selectedMicId && (devErr.name === 'OverconstrainedError' || devErr.name === 'NotFoundError')) {
                    console.warn('Selected mic unavailable, falling back to default:', devErr.message);
                    _selectedMicId = '';
                    localStorage.removeItem('vox_mic_id');

                    const sel = document.getElementById('micDeviceSelect');
                    if (sel) sel.value = '';

                    delete micConstraints.deviceId;
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints });
                } else {
                    throw devErr;
                }
            }

            const track = mediaStream.getAudioTracks()[0] || null;
            const settings = track?.getSettings ? track.getSettings() : {};
            console.info('[VOX solo mic]', {
                selected_device: _selectedMicId || 'default',
                track_label: track?.label || '',
                track_muted: !!track?.muted,
                track_enabled: track ? track.enabled : null,
                settings
            });

            audioContext = new AudioContext({ sampleRate: 16000 });
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            const workletCode = `
                class VoxProcessor extends AudioWorkletProcessor {
                    constructor() {
                        super();
                        this.buffer = [];
                        this.CHUNK_SIZE = 512;
                    }

                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (!input || !input[0]) return true;

                        const samples = input[0];
                        this.buffer.push(...samples);

                        while (this.buffer.length >= this.CHUNK_SIZE) {
                            const chunk = new Float32Array(this.buffer.splice(0, this.CHUNK_SIZE));
                            this.port.postMessage(chunk.buffer, [chunk.buffer]);
                        }

                        return true;
                    }
                }

                registerProcessor('vox-processor', VoxProcessor);
            `;

            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);

            const source = audioContext.createMediaStreamSource(mediaStream);
            // Wind-noise reduction: highpass filter cuts low-frequency rumble (<250 Hz)
            hpFilter = audioContext.createBiquadFilter();
            hpFilter.type = 'highpass'; hpFilter.frequency.value = 250; hpFilter.Q.value = 0.7;
            audioWorkletNode = new AudioWorkletNode(audioContext, 'vox-processor');
            let chunksSeen = 0;
            let silentChunksSeen = 0;

            audioWorkletNode.port.onmessage = (event) => {
                chunksSeen += 1;
                const chunk = new Float32Array(event.data);
                let peak = 0;
                for (let i = 0; i < chunk.length; i++) {
                    const abs = Math.abs(chunk[i]);
                    if (abs > peak) peak = abs;
                }
                if (peak < 0.00001) silentChunksSeen += 1;

                if (
                    !_micSilentRestartTried &&
                    _selectedMicId &&
                    chunksSeen >= 80 &&
                    silentChunksSeen === chunksSeen &&
                    isListening
                ) {
                    console.warn('[VOX solo mic] selected microphone is sending digital silence; retrying with default input');
                    _micSilentRestartTried = true;
                    _selectedMicId = '';
                    localStorage.removeItem('vox_mic_id');
                    const sel = document.getElementById('micDeviceSelect');
                    if (sel) sel.value = '';
                    stopMicrophone();
                    setTimeout(() => { if (isListening && !isPlaying) startMicrophone(); }, 100);
                    return;
                }

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data);
                }
                animateVAD(chunk);
            };

            source.connect(hpFilter);
            hpFilter.connect(audioWorkletNode);
        } catch (e) {
            console.error('Microphone error:', e);
            setStatus('disconnected', 'mic_error');
            isListening = false;
            document.body.classList.remove('is-recording');
            mainBtn.classList.remove('active');
            mainBtn.textContent = t('btnListen');
        }
    }

    function stopMicrophone() {
        if (audioWorkletNode) {
            audioWorkletNode.disconnect();
            audioWorkletNode = null;
        }
        if (hpFilter) {
            hpFilter.disconnect();
            hpFilter = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
    }

    // =====================================================================
    // Управление
    // =====================================================================
    async function toggleListening() {
        if (isListening) {
            isListening = false;
            document.body.classList.remove('is-recording');
            mainBtn.classList.remove('active');
            mainBtn.textContent = t('btnListen');

            stopMicrophone();
            _micPausedForTts = false; // сброс флага — mic уже остановлен вручную

            if (ws) {
                ws.close();
                ws = null;
            }

            // ВАЖНО:
            // не трогаем currentAudio и не чистим audioQueue,
            // чтобы уже начатый перевод доиграл до конца

            setStatus('disconnected', 'stopped');
            resetVAD();
        } else {
            isListening = true;
            mainBtn.classList.add('active');
            mainBtn.textContent = t('btnStop');
            setStatus('connected', 'connecting');
            _micSilentRestartTried = false;

            connectWebSocket();

            await new Promise(r => setTimeout(r, 500));

            if (!isPlaying) {
                await startMicrophone();
            }

            if (isListening) {
                document.body.classList.add('is-recording');
                setStatus('listening', 'listening');
            }
        }
    }

    // =====================================================================
    // UI утилиты
    // =====================================================================
    function setStatus(state, semanticKey) {
        statusDot.className = 'status-dot ' + state;
        currentStatusKey = semanticKey || state;
        statusText.textContent = t(statusKeyMap[currentStatusKey] || 'statusDisconnected');
    }

    function animateVAD(chunk) {
        let sum = 0;
        for (let i = 0; i < chunk.length; i++) {
            sum += chunk[i] * chunk[i];
        }
        const rms = Math.sqrt(sum / chunk.length);
        const level = Math.min(rms * 10, 1.0);

        vadBars.forEach((bar, i) => {
            const barLevel = Math.random() * level;
            const height = 4 + barLevel * 22;
            bar.style.height = height + 'px';
            bar.classList.toggle('active', level > 0.02);
        });
    }

    function resetVAD() {
        vadBars.forEach(bar => {
            bar.style.height = '8px';
            bar.classList.remove('active');
        });
    }

    async function syncSoloConfig() {
        const payload = {
            source_lang: sourceLangSelect.value,
            target_lang: langSelect.value,
            tts_enabled: _ttsEnabled,
        };

        try {
            await fetch('/set-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
        } catch (e) {
            console.error('Failed to sync config:', e);
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'config',
                ...payload,
            }));
        }
    }

    async function swapLanguages() {
        const prevSource = sourceLangSelect.value;
        sourceLangSelect.value = langSelect.value;
        langSelect.value = prevSource;
        await syncSoloConfig();
    }

    async function downloadHistoryPdf() {
        if (!soloFullHistory.length) {
            alert(t('pdfEmpty'));
            return;
        }

        const items = soloFullHistory.slice();
        const content = [
            { text: t('pdfTitle'), style: 'title', margin: [0, 0, 0, 14] },
            ...items.map(item => ({
                stack: [
                    {
                        text: item.time || '',
                        style: 'meta'
                    },
                    {
                        text: t('pdfOriginalLabel'),
                        style: 'label',
                        margin: [0, 6, 0, 2]
                    },
                    {
                        text: item.original || '',
                        style: 'body'
                    },
                    {
                        text: t('pdfTranslationLabel'),
                        style: 'labelAccent',
                        margin: [0, 8, 0, 2]
                    },
                    {
                        text: item.translation || '',
                        style: 'bodyAccent'
                    }
                ],
                margin: [0, 0, 0, 12],
                pageBreak: 'avoid'
            }))
        ];

        const docDefinition = {
            pageSize: 'A4',
            pageMargins: [28, 36, 28, 36],
            defaultStyle: {
                font: 'Roboto',
                fontSize: 11,
                lineHeight: 1.25
            },
            content,
            styles: {
                title: {
                    fontSize: 16,
                    bold: true,
                    color: '#111111'
                },
                meta: {
                    fontSize: 9,
                    color: '#666666'
                },
                label: {
                    fontSize: 10,
                    bold: true,
                    color: '#555555'
                },
                body: {
                    fontSize: 11,
                    color: '#111111'
                },
                labelAccent: {
                    fontSize: 10,
                    bold: true,
                    color: '#6b46c1'
                },
                bodyAccent: {
                    fontSize: 11,
                    color: '#2d1b69'
                }
            }
        };

        const filename = `vox-solo-history-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.pdf`;
        pdfMake.createPdf(docDefinition).open();
    }

    function addToHistory(original, translation, langFrom, langTo) {
        const now = new Date();
        const time = now.toLocaleTimeString(currentUILang === 'de' ? 'de-DE' : currentUILang === 'en' ? 'en-GB' : 'uk-UA', { hour: '2-digit', minute: '2-digit' });

        soloFullHistory.push({
            time,
            original,
            translation,
            langFrom,
            langTo,
        });

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="history-time">${time}</div>
            <div class="history-original">${escapeHtml(original)}</div>
            <div class="history-translation">${escapeHtml(translation)}</div>
        `;

        history.insertBefore(item, history.firstChild);

        while (history.children.length > 20) {
            history.removeChild(history.lastChild);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // --- Смена языков ---
    langSelect.addEventListener('change', syncSoloConfig);
    sourceLangSelect.addEventListener('change', syncSoloConfig);

    // ======== MIC DEVICE SELECTOR ========
    let _selectedMicId = localStorage.getItem('vox_mic_id') || '';

    // --- Инициализация ---
    applyUILanguage(false);
    console.log('VOX Solo v0.1.0');

    async function populateMicDevices() {
        try {
            let needsRequest = true;
            if (navigator.permissions) {
                try {
                    const perm = await navigator.permissions.query({ name: 'microphone' });
                    needsRequest = perm.state !== 'granted';
                } catch (_) {}
            }

            if (needsRequest) {
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null);
                if (tempStream) tempStream.getTracks().forEach(t => t.stop());
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');
            const sel = document.getElementById('micDeviceSelect');
            if (!sel) return;

            const saved = _selectedMicId;
            sel.innerHTML = `<option value="">${t('micDefault')}</option>`;

            mics.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = d.label || `${t('micUnknown')} ${i + 1}`;
                opt.selected = d.deviceId === saved;
                sel.appendChild(opt);
            });

            const micLbl = document.getElementById('micSelectorLabel');
            const micRefBtn = document.querySelector('.mic-refresh-btn');
            if (micLbl) micLbl.textContent = t('micLabel');
            if (micRefBtn) micRefBtn.title = t('micRefreshTitle');
        } catch (e) {
            console.warn('populateMicDevices failed:', e);
        }
    }

    function onMicDeviceChange(deviceId) {
        _selectedMicId = deviceId || '';
        localStorage.setItem('vox_mic_id', _selectedMicId);
        _updateHybridBtn(!_hybridMode || !!_selectedMicId);
    }

    function toggleMicHint() {
        const box = document.getElementById('micHintBox');
        if (!box) return;
        if (!box.classList.contains('open')) {
            box.textContent = t('micHint');
        }
        box.classList.toggle('open');
    }

    populateMicDevices();
    populateSpeakerDevices();
    _updateHybridBtn(!_hybridMode || !!_selectedMicId);

    navigator.mediaDevices.addEventListener('devicechange', async () => {
        await populateMicDevices();
        await populateSpeakerDevices();
        _updateHybridBtn(!_hybridMode || !!_selectedMicId);
    });

    </script>
