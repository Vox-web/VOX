<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>">
    <title>VOX — Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { overflow-x: hidden; }

        :root {
            --bg: #f4f2f7;
            --surface: #ffffff;
            --surface2: #edeaf3;
            --border: #ddd6e8;
            --text: #2d2640;
            --text2: #7a7189;
            --accent: #7c6aff;
            --accent-dim: rgba(124, 106, 255, 0.10);
            --green: #2ecc71;
            --yellow: #f0a500;
            --red: #e74c3c;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(100, 80, 160, 0.07);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header { text-align: center; padding: 12px 0 4px; }
        .header h1 {
            font-size: clamp(20px, 6vw, 28px); font-weight: 700;
            color: var(--accent); letter-spacing: clamp(2px, 1vw, 4px);
        }
        .header .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; word-break: break-word; }

        .screen { display: none; flex-direction: column; gap: 14px; }
        .screen.active { display: flex; }

        .card {
            background: var(--surface); border-radius: var(--radius); padding: 16px;
            box-shadow: var(--shadow);
        }
        .card-label {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text2); margin-bottom: 10px;
        }
        .card-text {
            font-size: 15px; line-height: 1.5; min-height: 20px; word-wrap: break-word;
        }
        .card.translation { border-left: 3px solid var(--accent); }
        .card.translation .card-text { color: var(--accent); font-size: 18px; }
        .card.original .card-text { color: var(--text2); }

        .btn {
            padding: 14px 24px; border-radius: 10px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.25s; text-align: center; width: 100%;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.15); }
        .btn-ghost {
            background: var(--surface2); color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-warning {
            background: var(--yellow); color: #111;
        }

        .lang-row {
            display: flex; align-items: center; gap: 12px;
            justify-content: center; padding: 8px 0;
        }
        .lang-row label { font-size: 13px; color: var(--text2); }
        select {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 14px; font-size: 14px; outline: none; cursor: pointer;
        }
        select:focus { border-color: var(--accent); }
        input[type="text"] {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; font-size: 14px; outline: none; width: 100%;
        }
        input:focus { border-color: var(--accent); }

        /* Status */
        .status-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 6px 16px; border-radius: 20px;
            background: var(--surface); font-size: 13px;
            box-shadow: var(--shadow);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--red);
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--green); }

        /* Speak banner */
        .speak-banner {
            display: none; text-align: center; padding: 20px;
            background: var(--accent-dim); border-radius: var(--radius);
            border: 2px solid var(--accent);
            animation: glowPulse 1.5s infinite;
        }
        .speak-banner.active { display: block; }
        .speak-banner h2 {
            font-size: 22px; color: var(--accent); margin-bottom: 8px;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(124,106,255,0.2); }
            50% { box-shadow: 0 0 25px rgba(124,106,255,0.4); }
        }

        /* VAD */
        .vad-indicator {
            display: flex; align-items: center; justify-content: center;
            gap: 3px; height: 30px; margin: 8px 0;
        }
        .vad-bar {
            width: 3px; height: 8px; background: var(--border);
            border-radius: 2px; transition: height 0.1s, background 0.1s;
        }
        .vad-bar.active { background: var(--accent); }

        /* Raise hand button */
        .hand-btn {
            padding: 16px; border-radius: 14px; border: 2px solid var(--border);
            background: var(--surface); color: var(--text);
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; width: 100%; text-align: center;
            box-shadow: var(--shadow);
        }
        .hand-btn:hover { border-color: var(--accent); }
        .hand-btn.requesting {
            border-color: var(--yellow); background: rgba(240,165,0,0.08);
            color: #b87a00;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; } 50% { opacity:0.6; }
        }

        /* Muted / kicked overlay */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(244,242,247,0.92);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 100; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; text-align: center; padding: 24px;
        }
        .overlay.active { display: flex; }
        .overlay h2 { font-size: 24px; }
        .overlay p { color: var(--text2); font-size: 14px; }

        /* Speaker selector */
        .speaker-selector {
            display: flex; align-items: center; gap: 8px;
            padding: 0 4px; margin-top: 4px;
        }
        .speaker-selector label { font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
        .speaker-selector select { flex: 1; min-width: 0; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font-size: 13px; outline: none; cursor: pointer; }
        .speaker-selector select:focus { border-color: var(--accent); }
        .speaker-selector .spk-refresh-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 15px; padding: 6px 8px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .speaker-selector .spk-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        .speaker-no-support { font-size: 11px; color: var(--text2); padding: 2px 4px; display: none; text-align: center; }

        /* History */
        .history {
            display: flex; flex-direction: column; gap: 6px;
            max-height: 220px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .history-item {
            background: var(--surface2); border-radius: 8px;
            padding: 8px 10px; font-size: 12px;
        }
        .history-time { color: var(--text2); font-size: 11px; }
        .history-original { color: var(--text2); }
        .history-translation { color: var(--accent); margin-top: 2px; }

        .divider { height: 1px; background: var(--surface2); margin: 2px 0; }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ======== Guest join hint ======== */
        .join-hint {
            background: var(--accent-dim);
            border: 1px solid rgba(124,106,255,0.25);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .join-hint-title {
            font-size: 13px; font-weight: 700; color: var(--accent);
            margin-bottom: 10px;
        }
        .join-hint ol {
            margin: 0; padding-left: 18px;
        }
        .join-hint ol li {
            font-size: 13px; color: var(--text2);
            margin-bottom: 6px; line-height: 1.4;
            word-break: break-word; overflow-wrap: break-word;
        }
        .join-hint ol li:last-child { margin-bottom: 0; }
        .join-hint ol li b { color: var(--text); }

        /* ======== FIXED TOP NAV ======== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            height: 52px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 1px 8px rgba(100,80,160,0.07);
        }
        .top-nav-logo {
            font-size: 20px; font-weight: 700; color: var(--accent);
            letter-spacing: 4px; font-family: -apple-system, sans-serif;
            text-decoration: none;
        }
        .top-nav-right {
            display: flex; align-items: center; gap: 8px;
        }
        .top-nav-btn {
            display: flex; align-items: center; gap: 5px;
            text-decoration: none; color: var(--text2);
            font-size: 13px; font-weight: 500;
            background: var(--surface2); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 9px;
            transition: all 0.2s; white-space: nowrap;
        }
        .top-nav-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
        .top-nav-btn.review-btn { background: rgba(240,165,0,0.10); border-color: rgba(240,165,0,0.3); color: #c47f00; }
        .top-nav-btn.review-btn:hover { background: rgba(240,165,0,0.18); }

        /* Push content below fixed nav */
        .container { padding-top: calc(52px + 16px) !important; }

        /* Hide old floating buttons */
        .review-fab { display: none !important; }

        @media (max-width: 400px) {
            .top-nav-btn span.nav-label { display: none; }
            .top-nav-btn { padding: 6px 9px; }
        }
    </style>
</head>

    <nav class="top-nav">
        <a href="/landing" class="top-nav-logo">VOX</a>
        <div class="top-nav-right">
            <!--<a href="/host" class="top-nav-btn">🏠 <span class="nav-label">На головну</span></a>-->
        </div>
    </nav>
    <div class="container">
        <div class="header">
            <div class="subtitle" id="roomLabel">Room</div>
        </div>

        <!-- ============================================================ -->
        <!-- SCREEN 1: Join -->
        <!-- ============================================================ -->
        <div class="screen active" id="screenJoin">
            <!-- Quick-start hint (filled by i18n) -->
            <div class="join-hint" id="joinHint"></div>

            <div class="card">
                <div class="card-label" id="joinTitle">Join Room</div>

                <div class="lang-row">
                    <label id="joinLangLabel">Your language:</label>
                    <select id="guestLangSelect">
                        <option value="en" selected>🇬🇧 English</option>
                        <option value="uk">🇺🇦 Українська</option>
                        <option value="de">🇩🇪 Deutsch</option>
                        <option value="ru">🇷🇺 Русский</option>
                        <option value="pl">🇵🇱 Polski</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="it">🇮🇹 Italiano</option>
                        <option value="pt">🇧🇷 Português</option>
                        <option value="ja">🇯🇵 日本語</option>
                        <option value="ko">🇰🇷 한국어</option>
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="tr">🇹🇷 Türkçe</option>
                        <option value="hi">🇮🇳 हिन्दी</option>
                    </select>
                </div>

                <div style="margin: 8px 0;">
                    <input type="text" id="displayNameInput" placeholder="Your name (optional)" maxlength="30">
                </div>

                <button class="btn btn-primary" onclick="joinRoom()" id="btnJoin">
                    Join
                </button>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- SCREEN 2: Room -->
        <!-- ============================================================ -->
        <div class="screen" id="screenRoom">
            <!-- Status -->
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connected</span>
            </div>

            <!-- Speak banner (appears when granted) -->
            <div class="speak-banner" id="speakBanner">
                <h2 id="speakNowText">🎤 SPEAK NOW</h2>
                <div class="vad-indicator" id="vadIndicator">
                    <div class="vad-bar"></div><div class="vad-bar"></div>
                    <div class="vad-bar"></div><div class="vad-bar"></div>
                    <div class="vad-bar"></div><div class="vad-bar"></div>
                    <div class="vad-bar"></div><div class="vad-bar"></div>
                    <div class="vad-bar"></div>
                </div>
                <div id="liveSpeechText" style="
                    margin-top:10px; padding:8px 12px; min-height:24px;
                    font-size:16px; color:var(--accent); font-weight:500;
                    background:var(--surface); border-radius:8px;
                    word-wrap:break-word; text-align:center;
                "></div>
                <button class="btn btn-ghost" onclick="doneSpeaking()" id="btnDone" style="margin-top:10px;">
                    ✅ Done
                </button>
            </div>

            <!-- Raise hand / request speak -->
            <button class="hand-btn" id="handBtn" onclick="toggleHandRaise()">
                <span id="handBtnText">🖐 I want to speak</span>
            </button>

            <!-- Speaker indicator (кто сейчас говорит) -->
            <div id="speakerIndicator" style="
                text-align:center; padding:6px 12px; font-size:13px;
                color:var(--text2); background:var(--accent-dim);
                border-radius:8px; display:none;
            ">
                <span id="speakerName"></span>
            </div>

            <div class="speaker-selector" id="speakerSelectorRow">
                <label id="speakerSelectorLabel">🔊</label>
                <select id="speakerDeviceSelect" onchange="onSpeakerDeviceChange(this.value)"></select>
                <button class="spk-refresh-btn" onclick="populateSpeakerDevices()" title="Refresh">↺</button>
            </div>
            <div class="speaker-no-support" id="speakerNoSupport"></div>

            <!-- Translation cards -->
            <div class="card original">
                <div class="card-label" id="labelOrig">Original</div>
                <div class="card-text" id="originalText">—</div>
            </div>
            <div class="card translation">
                <div class="card-label" id="labelTrans">Translation</div>
                <div class="card-text" id="translationText">—</div>
            </div>

            <div class="divider"></div>

            <div class="card-label" style="padding:0 4px;" id="labelHist">History</div>
            <div style="display:flex;justify-content:flex-end;padding:0 4px 8px;">
                <button class="btn btn-ghost" id="downloadPdfBtn" type="button" onclick="downloadGuestHistoryPdf()" style="width:auto;">Download PDF</button>
            </div>
            <div class="history" id="history"></div>
        </div>
    </div>

    <!-- Overlays -->
    <div class="overlay" id="overlayMuted">
        <h2>🔇</h2>
        <p id="mutedMsg">You have been muted by the host</p>
    </div>
    <div class="overlay" id="overlayKicked">
        <h2>❌</h2>
        <p id="kickedMsg">You have been removed from the room</p>
        <a id="kickedLandingLink" href="/landing" style="

    </div>
    <div class="overlay" id="overlayClosed">
        <h2>🔴</h2>
        <p id="closedMsg">The room has been closed</p>
        <a href="/landing" style="

            padding:10px 20px;border-radius:10px;
            box-shadow:0 4px 16px rgba(124,106,255,0.35);
        " id="goLandingClosed">← VOX</a>
    </div>

    // =================================================================
    // State
    // =================================================================
    let guestLang = 'en';
    let guestId = null;
    let roomId = null;
    let ws = null;
    let _wasKicked = false;
    let myState = 'listening'; // listening | requesting | speaking
    let currentSpeaker = 'Host';

    function serverLog(event, data = {}) {
        try {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: 'client_log',
                    event,
                    state: myState,
                    room_id: roomId,
                    guest_id: guestId,
                    data,
                    client_ts: new Date().toISOString(),
                }));
            }
        } catch (e) {
            console.warn('serverLog failed', e);
        }
    }

    window.addEventListener('error', (e) => {
        serverLog('window_error', {
            message: e?.message || 'unknown error',
            source: e?.filename || null,
            lineno: e?.lineno || null,
            colno: e?.colno || null,
            stack: e?.error?.stack || null,
        });
    });

    window.addEventListener('unhandledrejection', (e) => {
        const reason = e?.reason;
        serverLog('unhandled_rejection', {
            message: reason?.message || String(reason),
            stack: reason?.stack || null,
        });
    });

    // DOM
    const screenJoin = document.getElementById('screenJoin');
    const screenRoom = document.getElementById('screenRoom');
    const statusDot = document.getElementById('statusDot');
    const statusTextEl = document.getElementById('statusText');
    const speakBanner = document.getElementById('speakBanner');
    const handBtn = document.getElementById('handBtn');
    const handBtnText = document.getElementById('handBtnText');
    const originalText = document.getElementById('originalText');
    const translationText = document.getElementById('translationText');
    const historyDiv = document.getElementById('history');
    const vadBars = document.querySelectorAll('.vad-bar');

    // Extract room_id from URL: /room/{room_id}
    const pathParts = window.location.pathname.split('/');
    roomId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
    document.getElementById('roomLabel').textContent = `Room: ${roomId.toUpperCase()}`;

    // Load landing URL from server config (uses BASE_URL from .env)
    (async () => {
        try {
            const cfg = await fetch('/api/config').then(r => r.json());
            const url = cfg.landing_url || '/landing';
            const links = ['goLandingKicked', 'goLandingClosed'];
            links.forEach(id => { const el = document.getElementById(id); if(el) el.href = url; });
        } catch(e) {}
    })();
    // Восстановление сессии после обновления страницы
    const savedSession = sessionStorage.getItem(`vox_guest_${roomId}`);
    if (savedSession) {
        try {
            const sess = JSON.parse(savedSession);
            guestId = sess.guest_id;
            guestLang = sess.lang || 'en';
            document.getElementById('guestLangSelect').value = guestLang;
            applyI18n();
            screenJoin.classList.remove('active');
            screenRoom.classList.add('active');
            connectGuestWS();
            // Восстановить историю
            const hist = JSON.parse(sessionStorage.getItem(`vox_hist_${roomId}`) || '[]');
            hist.reverse().forEach(h => {
                const it = document.createElement('div'); it.className = 'history-item';
                const who = h.speaker ? `<span style="color:var(--accent);font-weight:600;">${escapeHtml(h.speaker)}</span> · ` : '';
                it.innerHTML = `<div class="history-time">${who}${h.tm}</div><div class="history-original">${escapeHtml(h.o)}</div><div class="history-translation">${escapeHtml(h.tr)}</div>`;
                historyDiv.insertBefore(it, historyDiv.firstChild);
            });
        } catch(e) { sessionStorage.removeItem(`vox_guest_${roomId}`); }
    }

    // =================================================================
    // i18n helper
    // =================================================================
    function t(key) {
        const strings = GUEST_I18N[guestLang] || GUEST_I18N['en'];
        return strings[key] || (GUEST_I18N['en'][key]) || key;
    }

    function applyI18n() {
        document.getElementById('joinTitle').textContent = t('joinTitle');
        document.getElementById('joinLangLabel').textContent = t('langLabel');
        document.getElementById('btnJoin').textContent = t('btnJoin');
        document.getElementById('labelOrig').textContent = t('labelOrig');
        document.getElementById('labelTrans').textContent = t('labelTrans');
        document.getElementById('labelHist').textContent = t('labelHist');
        document.getElementById('speakNowText').textContent = t('speakNow');
        document.getElementById('btnDone').textContent = t('btnDone');
        document.getElementById('mutedMsg').textContent = t('mutedMsg');
        document.getElementById('kickedMsg').textContent = t('kickedMsg');
        document.getElementById('closedMsg').textContent = t('closedMsg');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        if (downloadPdfBtn) downloadPdfBtn.textContent = t('downloadPdf');
        updateHandButton();
        const spkLbl = document.getElementById('speakerSelectorLabel');
        const spkRefBtn = document.querySelector('.spk-refresh-btn');
        const spkSel = document.getElementById('speakerDeviceSelect');
        const spkNoSup = document.getElementById('speakerNoSupport');
        if (spkLbl) spkLbl.textContent = t('speakerLabel');
        if (spkRefBtn) spkRefBtn.title = t('speakerRefreshTitle');
        if (spkSel && spkSel.options.length > 0 && spkSel.options[0].value === '') spkSel.options[0].textContent = t('speakerDefault');
        if (spkNoSup) spkNoSup.textContent = t('speakerNoSupport');
        const hintEl = document.getElementById('joinHint');
        if (hintEl) {
            const title = t('joinHintTitle');
            const steps = t('joinHintSteps');
            if (Array.isArray(steps)) {
                hintEl.innerHTML = `<div class="join-hint-title">${title}</div><ol>${steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
            } else {
                hintEl.style.display = 'none';
            }
        }
    }

    // Update i18n when language changes on join screen
    document.getElementById('guestLangSelect').addEventListener('change', (e) => {
        guestLang = e.target.value;
        applyI18n();
    });

    // =================================================================
    // Join room
    // =================================================================
    async function joinRoom() {
        guestLang = document.getElementById('guestLangSelect').value;
        const displayName = document.getElementById('displayNameInput').value.trim();
        const btn = document.getElementById('btnJoin');
        btn.textContent = '...';
        btn.disabled = true;

        try {
            const resp = await fetch(`/room/${roomId}/join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({language: guestLang, display_name: displayName}),
            });

            if (!resp.ok) {
                const err = await resp.json();
                alert(err.detail || 'Failed to join');
                btn.textContent = t('btnJoin');
                btn.disabled = false;
                return;
            }

            const data = await resp.json();
            guestId = data.guest_id;

            // Сохраняем сессию для восстановления при рефреше
            sessionStorage.setItem(`vox_guest_${roomId}`, JSON.stringify({
                guest_id: guestId,
                lang: guestLang,
                name: displayName,
            }));

            // Switch screens
            screenJoin.classList.remove('active');
            screenRoom.classList.add('active');
            applyI18n();

            serverLog('join_room_success', { guest_lang: guestLang, display_name: displayName || null });

            // Connect WebSocket
            connectGuestWS();

        } catch (e) {
            console.error('Join error:', e);
            serverLog('join_room_error', { message: String(e) });
            btn.textContent = t('btnJoin');
            btn.disabled = false;
        }
    }

    // =================================================================
    // WebSocket
    // =================================================================
    function connectGuestWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/ws/room/${roomId}/guest/${guestId}`;

        ws = new WebSocket(url);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            console.info('[VOX guest] ws open', { roomId, guestId });
            statusDot.className = 'status-dot connected';
            serverLog('ws_open', { room_id: roomId, guest_id: guestId });
            statusTextEl.textContent = t('statusConnected');
            // Изначально хост говорит
            document.getElementById('speakerName').textContent = '🎤 ' + t('hostSpeaking');
            document.getElementById('speakerIndicator').style.display = 'block';
            sendGuestAudioMeta('ws_open');
            if (myState === 'speaking') {
                flushGuestPreRoll('ws_open');
            }
        };

        ws.onclose = () => {
            console.info('[VOX guest] ws close', { roomId, guestId, state: myState });
            statusDot.className = 'status-dot';
            serverLog('ws_close', { room_id: roomId, guest_id: guestId });
            statusTextEl.textContent = t('statusDisconnected');
            if (guestId && !_wasKicked) setTimeout(connectGuestWS, 500);
        };

        ws.onerror = (err) => {
            console.error('[VOX guest] ws error', err);
            statusDot.className = 'status-dot';
            serverLog('ws_error', { message: 'websocket error' });
        };

        ws.onmessage = (event) => {
            if (event.data instanceof ArrayBuffer) {
                handleAudioMsg(event.data);
            } else {
                const msg = JSON.parse(event.data);
                if (msg?.type && msg.type !== 'transcript') {
                    console.info('[VOX guest] ws message', msg.type, msg);
                }
                handleJsonMsg(msg);
            }
        };
    }

    function handleJsonMsg(msg) {
        switch (msg.type) {
            case 'speak_granted':
                serverLog('recv_speak_granted', {
                    by: 'server',
                    has_mic: !!guestMicObj,
                    preparing: !!guestMicPreparing,
                    preroll_chunks: guestPreRoll.length,
                    preroll_frames: guestPreRollFrames,
                });
                myState = 'speaking';
                speakBanner.classList.add('active');
                handBtn.style.display = 'none';
                document.getElementById('speakerIndicator').style.display = 'none';
                startGuestMic();
                break;

            case 'speak_revoked':
                serverLog('recv_speak_revoked', { by: 'server' });
                myState = 'listening';
                speakBanner.classList.remove('active');
                handBtn.style.display = 'block';
                stopGuestMic('speak_revoked');
                updateHandButton();
                break;

            case 'speak_denied':
                serverLog('recv_speak_denied', { by: 'server' });
                myState = 'listening';
                stopGuestMic('speak_denied');
                updateHandButton();
                break;

            case 'muted':
                document.getElementById('overlayMuted').classList.add('active');
                break;

            case 'unmuted':
                document.getElementById('overlayMuted').classList.remove('active');
                break;

            case 'kicked':
                _wasKicked = true;
                document.getElementById('overlayKicked').classList.add('active');
                if (ws) { ws.close(); ws = null; }
                stopGuestMic('kicked');
                sessionStorage.removeItem(`vox_guest_${roomId}`);
                sessionStorage.removeItem(`vox_hist_${roomId}`);
                sessionStorage.removeItem(`vox_hist_${roomId}_full`);
                break;

            case 'room_closed':
                _wasKicked = true;
                document.getElementById('overlayClosed').classList.add('active');
                if (ws) { ws.close(); ws = null; }
                stopGuestMic('room_closed');
                sessionStorage.removeItem(`vox_guest_${roomId}`);
                sessionStorage.removeItem(`vox_hist_${roomId}`);
                sessionStorage.removeItem(`vox_hist_${roomId}_full`);
                break;

            case 'speaker_changed':
                // Показываем кто сейчас говорит (постоянный индикатор)
                const indicator = document.getElementById('speakerIndicator');
                const nameEl = document.getElementById('speakerName');
                if (msg.guest_id) {
                    // Гость получил слово
                    currentSpeaker = msg.display_name || 'Guest';
                    nameEl.textContent = '🎤 ' + (msg.display_name || 'Guest') + ' ' + t('speaking');
                    indicator.style.display = 'block';
                } else {
                    // null или undefined → хост говорит (или никто)
                    currentSpeaker = 'Host';
                    nameEl.textContent = '🎤 ' + t('hostSpeaking');
                    indicator.style.display = 'block';
                }
                break;

            case 'transcript':
                if (msg.is_final) {
                    serverLog('recv_transcript_final', { language: msg.language, text: (msg.text || '').slice(0, 80), confidence: msg.confidence });
                    originalText.textContent = msg.text || '—';
                    originalText.style.opacity='1';
                    translationText.textContent='⏳'; translationText.style.opacity='0.4';
                } else {
                    serverLog('recv_transcript_interim', { language: msg.language, text: (msg.text || '').slice(0, 80), confidence: msg.confidence });
                    // Deepgram interim — текст в реальном времени
                    originalText.textContent = '🎤 ' + (msg.text || (GUEST_I18N[guestLang]?.recording || 'Recording') + '...');
                    originalText.style.opacity='0.7';
                }
                // Live transcript в speak banner — гость видит свои слова
                if (myState === 'speaking') {
                    const el = document.getElementById('liveSpeechText');
                    if (el) el.textContent = msg.text || '';
                }
                break;

            case 'translation':
                serverLog('recv_translation', { lang_from: msg.lang_from, lang_to: msg.lang_to, text: (msg.text || '').slice(0, 80) });
                translationText.textContent = msg.text || '—';
                translationText.style.opacity='1';
                addToHistory(originalText.textContent, msg.text, msg.lang_from, msg.lang_to, msg.speaker || currentSpeaker);
                break;
        }
    }

    function handleAudioMsg(data) {
        if (myState === 'speaking') return;  // НЕ играть TTS пока говоришь!
        const prefix = new TextDecoder().decode(new Uint8Array(data, 0, 6));
        if (prefix === 'AUDIO:') playAudio(data.slice(6));
}

    
// =================================================================
    // _mic() — guest-оптимизация для realtime STT
    // =================================================================
    const GUEST_TARGET_SAMPLE_RATE = 16000;
    const GUEST_CHUNK_FRAMES = 1024;      // ~64 ms @ 16 kHz
    const GUEST_PREROLL_CHUNKS = 16;      // ~1.0 s pre-roll

    async function _mic(name, onChunk) {
        const requestedConstraints = {
            sampleRate: GUEST_TARGET_SAMPLE_RATE,
            channelCount: 1,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
        };

        const st = await navigator.mediaDevices.getUserMedia({
            audio: requestedConstraints
        });

        const track = st.getAudioTracks()[0] || null;
        const settings = track?.getSettings ? track.getSettings() : {};
        const cx = new AudioContext({ sampleRate: GUEST_TARGET_SAMPLE_RATE });

        const code = `
            class ${name} extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.b = [];
                }
                process(inputs) {
                    const c = inputs[0]?.[0];
                    if (!c) return true;
                    this.b.push(...c);
                    while (this.b.length >= ${GUEST_CHUNK_FRAMES}) {
                        const ch = new Float32Array(this.b.splice(0, ${GUEST_CHUNK_FRAMES}));
                        this.port.postMessage(ch.buffer, [ch.buffer]);
                    }
                    return true;
                }
            }
            registerProcessor('${name}', ${name});
        `;

        const bl = new Blob([code], { type: 'application/javascript' });
        const u = URL.createObjectURL(bl);
        await cx.audioWorklet.addModule(u);
        URL.revokeObjectURL(u);

        const src = cx.createMediaStreamSource(st);
        const nd = new AudioWorkletNode(cx, name);
        nd.port.onmessage = e => onChunk(e.data);
        src.connect(nd);
        // Не подключаем к destination: это capture-only тракт.

        const meta = {
            requested_sample_rate: GUEST_TARGET_SAMPLE_RATE,
            context_sample_rate: Number(cx.sampleRate) || null,
            track_sample_rate: Number(settings.sampleRate) || null,
            track_channel_count: Number(settings.channelCount) || 1,
            echo_cancellation: settings.echoCancellation ?? false,
            noise_suppression: settings.noiseSuppression ?? false,
            auto_gain_control: settings.autoGainControl ?? false,
            sample_format: 'float32',
            chunk_frames: GUEST_CHUNK_FRAMES,
        };
        console.info('[VOX guest mic]', {
            requested: requestedConstraints,
            actual: meta,
        });

        return {
            meta,
            async resume() {
                if (cx.state !== 'running') {
                    await cx.resume();
                }
                return cx.state;
            },
            getState() { return cx.state; },
            stop() {
                try { nd.disconnect(); } catch (_) {}
                try { src.disconnect(); } catch (_) {}
                try { cx.close(); } catch (_) {}
                st.getTracks().forEach(t => t.stop());
            }
        };
    }

    // =================================================================
    // Hand raise — realtime-safe guest mic flow
    // =================================================================
    let guestMicObj = null;
    let guestMicMeta = null;
    let guestMicPreparing = null;
    let _currentMicAbortToken = null;   // для отмены гонки prepareGuestMic vs stopGuestMic
    let guestFirstChunkArrived = false;
    let guestFirstChunkBlocked = false;
    let guestFirstChunkSent = false;
    let guestLiveChunksSent = 0;
    let guestPreRoll = [];
    let guestPreRollFrames = 0;

    function clearGuestPreRoll() {
        guestPreRoll = [];
        guestPreRollFrames = 0;
    }

    function pushGuestPreRoll(buf) {
        const copy = buf.slice(0);
        guestPreRoll.push(copy);
        guestPreRollFrames += copy.byteLength / 4;

        while (guestPreRoll.length > GUEST_PREROLL_CHUNKS) {
            const dropped = guestPreRoll.shift();
            guestPreRollFrames -= dropped.byteLength / 4;
        }
    }

    function canStreamGuestAudio() {
        return myState === 'speaking' && ws?.readyState === WebSocket.OPEN;
    }

    function flushGuestPreRoll(reason = 'unknown') {
    if (!canStreamGuestAudio()) {
        serverLog('preroll_flush_skip_gate_closed', {
            reason,
            buffered_chunks: guestPreRoll.length,
            buffered_frames: guestPreRollFrames,
            state: myState,
            ws_state: ws ? ws.readyState : null,
        });
        return 0;
    }

    if (!guestPreRoll.length) {
        serverLog('preroll_flush_skip_empty', { reason });
        return 0;
    }

    const chunks = guestPreRoll.slice();
    const frames = guestPreRollFrames;
    clearGuestPreRoll();

    let sent = 0;

    for (const chunk of chunks) {
        try {
            ws.send(chunk);
            sent++;
            if (sent <= 3) {
                serverLog('preroll_chunk_sent', {
                    reason,
                    seq: sent,
                    bytes: chunk.byteLength,
                    ws_state: ws ? ws.readyState : null,
                });
            }
        } catch (e) {
            serverLog('preroll_chunk_send_error', {
                reason,
                seq: sent + 1,
                total_chunks: chunks.length,
                message: e?.message || String(e),
                stack: e?.stack || null,
                name: e?.name || null,
                ws_state: ws ? ws.readyState : null,
            });
            break;
        }
    }

    serverLog('preroll_flushed', {
        reason,
        chunks: sent,
        frames,
        approx_ms: Math.round(frames / GUEST_TARGET_SAMPLE_RATE * 1000),
    });

    return sent;
}

    function sendGuestAudioMeta(reason = 'unknown') {
    serverLog('send_audio_meta_begin', {
        reason,
        has_meta: !!guestMicMeta,
        ws_state: ws ? ws.readyState : null,
    });

    if (!guestMicMeta) {
        serverLog('send_audio_meta_skip_no_meta', { reason });
        return false;
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        serverLog('send_audio_meta_skip_ws_not_open', {
            reason,
            ws_state: ws ? ws.readyState : null
        });
        return false;
    }

    try {
        const payload = JSON.stringify({
            type: 'audio_meta',
            source: 'guest',
            ...guestMicMeta,
        });

        serverLog('send_audio_meta_before_ws_send', {
            reason,
            payload_bytes: payload.length,
            ws_state: ws.readyState,
        });

        ws.send(payload);

        serverLog('send_audio_meta_after_ws_send', {
            reason,
            payload_bytes: payload.length,
            ws_state: ws.readyState,
        });

        serverLog('send_audio_meta_done', { reason, ...guestMicMeta });
        return true;
    } catch (e) {
        serverLog('send_audio_meta_error', {
            reason,
            message: e?.message || String(e),
            stack: e?.stack || null,
            name: e?.name || null,
            ws_state: ws ? ws.readyState : null,
        });
        return false;
    }
}

    async function prepareGuestMic(reason = 'unknown') {
        if (guestMicObj) {
            serverLog('mic_prepare_skip_existing', {
                reason,
                context_sr: guestMicMeta?.context_sample_rate || null,
                track_sr: guestMicMeta?.track_sample_rate || null
            });
            return guestMicObj;
        }
        if (guestMicPreparing) {
            serverLog('mic_prepare_wait_existing', { reason });
            return guestMicPreparing;
        }

        guestFirstChunkSent = false;
        guestFirstChunkBlocked = false;
        guestFirstChunkArrived = false;  // сбрасываем для корректного повторного логирования
        clearGuestPreRoll();
        serverLog('mic_prepare_begin', { reason });

        // Токен отмены: если stopGuestMic() вызовут пока getUserMedia ещё висит,
        // мы это заметим и не присвоим guestMicObj устаревшим треком.
        const _abortToken = {};
        _currentMicAbortToken = _abortToken;

        guestMicPreparing = (async () => {
            const mic = await _mic('VoxGP', buf => {
                const floatBuf = new Float32Array(buf);

                if (!guestFirstChunkArrived) {
                    guestFirstChunkArrived = true;
                    serverLog('first_chunk_arrived', {
                        bytes: buf.byteLength,
                        frames: floatBuf.length,
                        state: myState,
                        ws_state: ws ? ws.readyState : null,
                        cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                        context_sr: guestMicMeta?.context_sample_rate || null,
                        track_sr: guestMicMeta?.track_sample_rate || null,
                    });
                }

                if (myState === 'requesting' || myState === 'speaking') {
                    animateVAD(floatBuf);
                }

                if (myState === 'requesting') {
                    pushGuestPreRoll(buf);
                    if (!guestFirstChunkBlocked) {
                        guestFirstChunkBlocked = true;
                        serverLog('first_chunk_buffered_in_requesting', {
                            bytes: buf.byteLength,
                            frames: floatBuf.length,
                            buffered_chunks: guestPreRoll.length,
                            buffered_frames: guestPreRollFrames,
                            ws_state: ws ? ws.readyState : null,
                            cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                        });
                    }
                    return;
                }

                if (!canStreamGuestAudio()) {
                    if (!guestFirstChunkBlocked) {
                        guestFirstChunkBlocked = true;
                        serverLog('first_chunk_blocked', {
                            bytes: buf.byteLength,
                            frames: floatBuf.length,
                            state: myState,
                            ws_state: ws ? ws.readyState : null,
                            cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                        });
                    }
                    return;
                }

                if (!guestFirstChunkSent) {
                    serverLog('first_chunk_gate_open', {
                        bytes: buf.byteLength,
                        frames: floatBuf.length,
                        ws_state: ws ? ws.readyState : null,
                        cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                        context_sr: guestMicMeta?.context_sample_rate || null,
                        track_sr: guestMicMeta?.track_sample_rate || null,
                    });

                    const prerollFlushedNow = flushGuestPreRoll('first_live_chunk');
                    serverLog('first_chunk_after_preroll_flush', {
                        preroll_flushed_chunks: prerollFlushedNow,
                        ws_state: ws ? ws.readyState : null,
                        cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                    });

                    guestFirstChunkSent = true;
                    serverLog('first_audio_chunk_sent', {
                        bytes: buf.byteLength,
                        frames: floatBuf.length,
                        cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                        context_sr: guestMicMeta?.context_sample_rate || null,
                        track_sr: guestMicMeta?.track_sample_rate || null,
                    });
                }

                try {
                    ws.send(buf);
                    guestLiveChunksSent++;

                    if (guestLiveChunksSent <= 5) {
                        serverLog('live_audio_chunk_sent', {
                            seq: guestLiveChunksSent,
                            bytes: buf.byteLength,
                            frames: floatBuf.length,
                            ws_state: ws ? ws.readyState : null,
                            cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                            context_sr: guestMicMeta?.context_sample_rate || null,
                            track_sr: guestMicMeta?.track_sample_rate || null,
                        });
                    }
                } catch (e) {
                    serverLog('live_audio_chunk_send_error', {
                        seq: guestLiveChunksSent + 1,
                        message: e?.message || String(e),
                        stack: e?.stack || null,
                        name: e?.name || null,
                        ws_state: ws ? ws.readyState : null,
                    });
                }
            });

            // Если stopGuestMic() был вызван пока мы ждали getUserMedia —
            // трек уже не нужен, останавливаем его и выходим.
            if (_abortToken !== _currentMicAbortToken) {
                serverLog('mic_prepare_aborted', { reason });
                try { mic.stop(); } catch (_) {}
                return null;
            }

            guestMicObj = mic;
            guestMicMeta = mic?.meta || null;
            serverLog('mic_prepare_ok', guestMicMeta || {});

            serverLog('mic_prepare_resume_begin', {
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
            });
            const prepareResumedState = guestMicObj?.resume ? await guestMicObj.resume() : null;
            serverLog('mic_prepare_resume_done', {
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                resumed_state: prepareResumedState,
            });
            return mic;
        })();

        try {
            return await guestMicPreparing;
        } catch (e) {
            serverLog('mic_prepare_error', { reason, message: String(e) });
            throw e;
        } finally {
            guestMicPreparing = null;
        }
    }

    async function toggleHandRaise() {
        if (myState === 'listening') {
            myState = 'requesting';

                ws.send(JSON.stringify({ action: 'request_speak' }));

            try {

                ws.send(JSON.stringify({ action: 'cancel_request' }));
                serverLog('send_cancel_request', { state: myState });

    // startGuestMic / stopGuestMic — реальный старт/стоп микрофона гостя
    async function startGuestMic() {
        serverLog('start_guest_mic_begin', {
            has_mic: !!guestMicObj,
            preparing: !!guestMicPreparing,
            ws_state: ws ? ws.readyState : null,
            preroll_chunks: guestPreRoll.length,
            preroll_frames: guestPreRollFrames,
        });

        try {
            await prepareGuestMic('speak_granted');
            serverLog('start_guest_mic_after_prepare', {
                has_mic: !!guestMicObj,
                has_meta: !!guestMicMeta,
                context_sr: guestMicMeta?.context_sample_rate || null,
                track_sr: guestMicMeta?.track_sample_rate || null,
                ws_state: ws ? ws.readyState : null,
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                preroll_chunks: guestPreRoll.length,
                preroll_frames: guestPreRollFrames,
            });

            const currentCxState = guestMicObj?.getState ? guestMicObj.getState() : null;

            serverLog('audio_context_state_before_resume', {
                cx_state: currentCxState,
            });

            let resumedState = currentCxState;

            if (currentCxState !== 'running' && guestMicObj?.resume) {
                resumedState = await guestMicObj.resume();
            } else {
                serverLog('audio_context_resume_skip_already_running', {
                    cx_state: currentCxState,
                });
            }

            serverLog('audio_context_state_after_resume', {
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
                resumed_state: resumedState,
            });

            const metaSent = sendGuestAudioMeta('speak_granted');
            const prerollFlushed = flushGuestPreRoll('speak_granted');
            serverLog('start_guest_mic_after_send_meta', {
                has_mic: !!guestMicObj,
                has_meta: !!guestMicMeta,
                meta_sent: !!metaSent,
                preroll_flushed_chunks: prerollFlushed,
                ws_state: ws ? ws.readyState : null,
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
            });

            serverLog('start_guest_mic_ready', {
                has_mic: !!guestMicObj,
                context_sr: guestMicMeta?.context_sample_rate || null,
                track_sr: guestMicMeta?.track_sample_rate || null,
                cx_state: guestMicObj?.getState ? guestMicObj.getState() : null,
            });
        } catch (e) {
            console.error('Guest mic err:', e);
            serverLog('start_guest_mic_error', {
                message: e?.message || String(e),
                stack: e?.stack || null,
                name: e?.name || null,
            });
        }
    }

    function stopGuestMic(reason = 'unknown') {
    serverLog('stop_guest_mic_called', {
        reason,
        had_mic: !!guestMicObj,
        preparing: !!guestMicPreparing,
        preroll_chunks: guestPreRoll.length,
        preroll_frames: guestPreRollFrames,
        live_chunks_sent: guestLiveChunksSent,
    });
    guestMicObj?.stop();
    guestMicObj = null;
    guestMicMeta = null;
    guestMicPreparing = null;
    _currentMicAbortToken = null;   // инвалидируем любой висящий prepareGuestMic
    guestFirstChunkArrived = false;
    guestFirstChunkBlocked = false;
    guestFirstChunkSent = false;
    guestLiveChunksSent = 0;
    clearGuestPreRoll();
    resetVAD();
}
    // =================================================================
    // Audio playback (с разблокировкой AudioContext после рефреша)
    // =================================================================
    let _audioUnlocked = false;

    // Браузер блокирует AudioContext без user gesture.
    // =================================================================
    // TTS Playback — через <audio> тег, без Web Audio API
    // Это единственный надёжный способ на Android: не создаётся второй
    // AudioContext который убивает микрофонный.
    // =================================================================
    const _audioPlayer = new Audio();
    let _audioObjectUrl = null;
    const audioQueue = [];
    let isPlaying = false;

    _audioPlayer.onended = () => {
        if (_audioObjectUrl) { URL.revokeObjectURL(_audioObjectUrl); _audioObjectUrl = null; }
        isPlaying = false;
        processAudioQueue();
    };
    _audioPlayer.onerror = (e) => {
        console.error('Audio playback error:', e);
        if (_audioObjectUrl) { URL.revokeObjectURL(_audioObjectUrl); _audioObjectUrl = null; }
        isPlaying = false;
        processAudioQueue();
    };

    async function playAudio(mp3Bytes) {
        audioQueue.push(mp3Bytes);
        if (!isPlaying) processAudioQueue();
    }

    function processAudioQueue() {
        if (audioQueue.length === 0) { isPlaying = false; return; }
        isPlaying = true;
        const mp3 = audioQueue.shift();
        try {
            if (_audioObjectUrl) URL.revokeObjectURL(_audioObjectUrl);
            const blob = new Blob([mp3], { type: 'audio/mpeg' });
            _audioObjectUrl = URL.createObjectURL(blob);
            _audioPlayer.src = _audioObjectUrl;
            _applySinkId(_audioPlayer).finally(() => _audioPlayer.play().catch(e => {
                console.warn('Audio play() failed:', e);
                isPlaying = false;
                processAudioQueue();
            }));
        } catch (e) {
            console.error('processAudioQueue error:', e);
            isPlaying = false;
            processAudioQueue();
        }
    }

    // Разблокировка audio при первом тапе (мобильный autoplay policy)
    function _ensureAudioUnlock() {
        if (_audioUnlocked) return;
        const unlock = () => {
            // Воспроизводим тишину чтобы разблокировать audio element
            _audioPlayer.src = 'data:audio/mpeg;base64,/+MYxAAAAANIAAAAAExBTUUzLjk4LjIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
            _audioPlayer.play().catch(() => {});
            _audioUnlocked = true;
            document.removeEventListener('click', unlock, true);
            document.removeEventListener('touchstart', unlock, true);
        };
        document.addEventListener('click', unlock, true);
        document.addEventListener('touchstart', unlock, true);
    }
    _ensureAudioUnlock();

    // =================================================================
    // Speaker output selector (setSinkId)
    // =================================================================
    let _selectedSpeakerId = localStorage.getItem('vox_speaker_id') || '';
    function _speakerSupported() {
        return typeof HTMLMediaElement !== 'undefined' && typeof HTMLMediaElement.prototype.setSinkId === 'function';
    }
    async function populateSpeakerDevices() {
        const row = document.getElementById('speakerSelectorRow');
        const noSup = document.getElementById('speakerNoSupport');
        const sel = document.getElementById('speakerDeviceSelect');
        if (!row || !noSup || !sel) return;
        if (!_speakerSupported()) {
            row.style.display = 'none';
            noSup.textContent = t('speakerNoSupport');
            noSup.style.display = 'block';
            return;
        }
        row.style.display = '';
        noSup.style.display = 'none';
        try {
            if (typeof navigator.mediaDevices.selectAudioOutput === 'function') {
                try { await navigator.mediaDevices.selectAudioOutput({deviceId: _selectedSpeakerId || undefined}); } catch (_) {}
            }
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outs = devices.filter(d => d.kind === 'audiooutput');
            sel.innerHTML = `<option value="">${t('speakerDefault')}</option>`;
            outs.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = d.label || `${t('speakerUnknown')} ${i + 1}`;
                opt.selected = d.deviceId === _selectedSpeakerId;
                sel.appendChild(opt);
            });
        } catch (e) { console.warn('populateSpeakerDevices failed:', e); }
    }
    function onSpeakerDeviceChange(deviceId) {
        _selectedSpeakerId = deviceId || '';
        localStorage.setItem('vox_speaker_id', _selectedSpeakerId);
        _applySinkId(_audioPlayer);
    }
    async function _applySinkId(audioEl) {
        if (!audioEl || !_speakerSupported() || !_selectedSpeakerId) return;
        try { await audioEl.setSinkId(_selectedSpeakerId); } catch (e) { console.warn('setSinkId failed:', e); }
    }

    // =================================================================
    // UI utilities
    // =================================================================
    function animateVAD(chunk) {
        let sum = 0;
        for (let i = 0; i < chunk.length; i++) sum += chunk[i] * chunk[i];
        const rms = Math.sqrt(sum / chunk.length);
        const level = Math.min(rms * 10, 1.0);
        vadBars.forEach(bar => {
            bar.style.height = (4 + Math.random() * level * 20) + 'px';
            bar.classList.toggle('active', level > 0.02);
        });
    }
    function resetVAD() {
        vadBars.forEach(b => { b.style.height = '8px'; b.classList.remove('active'); });
    }

    async function downloadGuestHistoryPdf() {
        const rawItems = JSON.parse(sessionStorage.getItem(`vox_hist_${roomId}_full`) || '[]');

        if (!rawItems.length) {
            alert(t('pdfEmpty'));
            return;
        }

        const items = rawItems.slice().reverse();

        const content = [
            { text: t('pdfTitleRoom'), style: 'title', margin: [0, 0, 0, 14] },
            ...items.map(h => ({
                stack: [
                    {
                        text: `${h.speaker ? h.speaker + ' · ' : ''}${h.tm || ''}`,
                        style: 'meta'
                    },
                    {
                        text: t('pdfOriginalLabel'),
                        style: 'label',
                        margin: [0, 6, 0, 2]
                    },
                    {
                        text: h.o || '',
                        style: 'body'
                    },
                    {
                        text: t('pdfTranslationLabel'),
                        style: 'labelAccent',
                        margin: [0, 8, 0, 2]
                    },
                    {
                        text: h.tr || '',
                        style: 'bodyAccent'
                    }
                ],
                margin: [0, 0, 0, 12],
                pageBreak: 'avoid'
            }))
        ];

        const docDefinition = {
            pageSize: 'A4',
            pageMargins: [28, 36, 28, 36],
            defaultStyle: {
                font: 'Roboto',
                fontSize: 11,
                lineHeight: 1.25
            },
            content,
            styles: {
                title: {
                    fontSize: 16,
                    bold: true,
                    color: '#111111'
                },
                meta: {
                    fontSize: 9,
                    color: '#666666'
                },
                label: {
                    fontSize: 10,
                    bold: true,
                    color: '#555555'
                },
                body: {
                    fontSize: 11,
                    color: '#111111'
                },
                labelAccent: {
                    fontSize: 10,
                    bold: true,
                    color: '#6b46c1'
                },
                bodyAccent: {
                    fontSize: 11,
                    color: '#2d1b69'
                }
            }
        };

        const filename = `vox-room-history-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.pdf`;
        pdfMake.createPdf(docDefinition).download(filename);
    }

    function addToHistory(original, translation, from, to, speaker) {
        const time = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
        const item = document.createElement('div');
        item.className = 'history-item fade-in';
        const who = speaker ? `<span style="color:var(--accent);font-weight:600;">${escapeHtml(speaker)}</span> · ` : '';
        item.innerHTML = `
            <div class="history-time">${who}${time}</div>
            <div class="history-original">${escapeHtml(original)}</div>
            <div class="history-translation">${escapeHtml(translation)}</div>`;
        historyDiv.insertBefore(item, historyDiv.firstChild);
        while (historyDiv.children.length > 20) historyDiv.removeChild(historyDiv.lastChild);
        const shortArr = JSON.parse(sessionStorage.getItem(`vox_hist_${roomId}`) || '[]');
        shortArr.unshift({o: original, tr: translation, speaker, tm: time});
        if (shortArr.length > 20) shortArr.length = 20;
        sessionStorage.setItem(`vox_hist_${roomId}`, JSON.stringify(shortArr));
        const fullArr = JSON.parse(sessionStorage.getItem(`vox_hist_${roomId}_full`) || '[]');
        fullArr.unshift({o: original, tr: translation, speaker, tm: time});
        sessionStorage.setItem(`vox_hist_${roomId}_full`, JSON.stringify(fullArr));
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    // Init i18n
    applyI18n();
    populateSpeakerDevices();
    // Один глобальный listener — не дублируется при реконнектах
    window.addEventListener('online', () => {
        if (guestId && !_wasKicked && (!ws || ws.readyState === WebSocket.CLOSED)) connectGuestWS();
    });
    console.log('VOX Guest v0.6.0');
    </script>
