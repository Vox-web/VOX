<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOX — Посібник користувача та правила конфіденційних даних ЄС</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09080f;
  --bg2:#110e1c;
  --surface:#15121f;
  --surface2:#1e1930;
  --surface3:#241f36;
  --border:#2a2340;
  --border2:#3d3560;
  --text:#f0eeff;
  --text2:#9b93c4;
  --text3:#5e5880;
  --accent:#7c6aff;
  --accent2:#a594ff;
  --accent-dim:rgba(124,106,255,.12);
  --accent-glow:rgba(124,106,255,.35);
  --green:#2dd4a0;
  --green-dim:rgba(45,212,160,.12);
  --yellow:#f0c050;
  --yellow-dim:rgba(240,192,80,.12);
  --red:#ff5f7e;
  --radius:16px;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
a{color:inherit}

.mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh-bg::before{
  content:'';position:absolute;width:900px;height:900px;top:-250px;left:-200px;
  background:radial-gradient(circle,rgba(124,106,255,.18) 0%,transparent 65%);
  animation:pulse1 8s ease-in-out infinite alternate;
}
.mesh-bg::after{
  content:'';position:absolute;width:700px;height:700px;bottom:-200px;right:-150px;
  background:radial-gradient(circle,rgba(160,100,255,.14) 0%,transparent 65%);
  animation:pulse1 10s ease-in-out 2s infinite alternate;
}
@keyframes pulse1{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.15) rotate(12deg)}}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(9,8,15,.72);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:var(--accent);letter-spacing:5px;text-decoration:none;
}
.nav-right{display:flex;align-items:center;gap:10px;min-width:0}
.back-link{
  border:1px solid var(--border2);background:transparent;color:var(--text2);
  font-size:13px;font-weight:500;text-decoration:none;padding:8px 14px;border-radius:10px;
  transition:all .25s;white-space:nowrap;
}
.back-link:hover{border-color:var(--accent);color:var(--accent2)}
.lang-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;gap:2px}
.lang-btn{
  border:none;background:transparent;color:var(--text3);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .25s;
}
.lang-btn:hover{color:var(--text2)}
.lang-btn.active{color:#fff;background:var(--accent);box-shadow:0 2px 12px var(--accent-glow)}

main{position:relative;z-index:1}
.section{padding:92px 24px}
.container{max-width:1100px;margin:0 auto}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding-top:110px}
.hero .container{max-width:980px}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent-dim);border:1px solid rgba(124,106,255,.3);
  color:var(--accent2);font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:99px;margin-bottom:28px;
}
.hero h1{
  font-family:'Syne',sans-serif;font-size:clamp(42px,7vw,84px);font-weight:800;
  line-height:1.02;letter-spacing:-2px;margin-bottom:18px;white-space:pre-line;
}
.hero h1 .accent{background:linear-gradient(135deg,var(--accent) 0%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{max-width:820px;margin:0 auto 22px;color:var(--text2);font-size:18px;line-height:1.7}
.hero-note{
  max-width:820px;margin:0 auto 36px;padding:16px 18px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:16px;color:var(--text2);font-size:14px;line-height:1.7;
}
.hero-cta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
.btn-primary,.btn-secondary{
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
  padding:14px 28px;border-radius:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  transition:all .25s;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 8px 32px var(--accent-glow)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent2);transform:translateY(-2px)}

.anchor-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.anchor-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:999px;text-decoration:none;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--text2);font-size:14px;transition:all .25s;
}
.anchor-pill:hover{border-color:var(--accent);color:var(--accent2);transform:translateY(-1px)}

.section-head{text-align:center;margin-bottom:46px}
.section-tag{
  display:inline-block;background:var(--accent-dim);color:var(--accent2);
  font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:6px 14px;border-radius:99px;border:1px solid rgba(124,106,255,.3);margin-bottom:18px;
}
.section-title{
  font-family:'Syne',sans-serif;font-size:clamp(30px,5vw,54px);font-weight:800;
  line-height:1.08;letter-spacing:-1px;margin-bottom:16px;white-space:pre-line;
}
.section-desc{max-width:760px;margin:0 auto;color:var(--text2);font-size:17px;line-height:1.7}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;
  transition:all .3s;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .25s;
}
.card:hover{border-color:rgba(124,106,255,.45);transform:translateY(-4px)}
.card:hover::before{opacity:1}
.card-icon{font-size:34px;margin-bottom:18px;display:block}
.card h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px}
.card p{color:var(--text2);font-size:15px;line-height:1.7}

.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px}
.step-num{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  box-shadow:0 8px 24px var(--accent-glow);margin-bottom:18px;
}
.step-card h3{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:10px}
.step-card p{color:var(--text2);font-size:15px;line-height:1.7}

.timeline{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;
}
.timeline-item{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid rgba(124,106,255,.22);border-radius:20px;padding:24px;
}
.timeline-item h3{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:10px}
.timeline-item p{color:var(--text2);font-size:15px;line-height:1.7}

.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.price-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;
}
.price-card.highlight{border-color:var(--accent);box-shadow:0 0 26px rgba(124,106,255,.14)}
.price-amount{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;margin-bottom:6px}
.price-unit{color:var(--text3);font-size:14px;margin-bottom:14px}
.price-desc{color:var(--text2);font-size:15px;line-height:1.7}
.price-badge{
  display:inline-block;margin-top:14px;background:var(--green-dim);border:1px solid rgba(45,212,160,.25);
  color:var(--green);font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;
}

.notice{
  margin:0 auto 28px;max-width:920px;padding:18px 20px;border-radius:18px;
  background:rgba(240,192,80,.08);border:1px solid rgba(240,192,80,.2);
  color:#e7d8a3;line-height:1.7;font-size:14px;
}
.notice strong{color:#fff}

.table-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:860px}
th,td{padding:18px 18px;vertical-align:top;text-align:left}
thead th{
  background:var(--surface2);color:var(--accent2);font-size:12px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody td{color:var(--text2);font-size:14px;line-height:1.7}
tbody td:first-child{color:var(--text);font-weight:600;width:24%}

.sources-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.source-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;
  display:flex;flex-direction:column;gap:12px;
}
.source-card h3{font-size:17px;line-height:1.45}
.source-card p{color:var(--text2);font-size:14px;line-height:1.7}
.source-link{color:var(--accent2);text-decoration:none;font-weight:600;font-size:14px}
.source-link:hover{text-decoration:underline}
.sources-block{margin-top:28px}

.cta-section{
  background:linear-gradient(135deg,rgba(124,106,255,.15) 0%,rgba(160,100,255,.1) 100%);
  border-top:1px solid rgba(124,106,255,.2);border-bottom:1px solid rgba(124,106,255,.2);
  text-align:center;
}
.cta-card{
  max-width:920px;margin:0 auto;background:rgba(9,8,15,.22);border:1px solid rgba(124,106,255,.22);
  border-radius:24px;padding:42px 28px;
}
.cta-card .section-title{margin-bottom:12px}
.cta-card .section-desc{margin-bottom:28px}

footer{background:var(--bg2);border-top:1px solid var(--border);padding:48px 24px 32px;position:relative;z-index:1}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;flex-wrap:wrap;gap:32px;justify-content:space-between;align-items:flex-start}
.footer-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);letter-spacing:5px;margin-bottom:8px}
.footer-tagline{color:var(--text3);font-size:14px}
.footer-links{display:flex;flex-direction:column;gap:10px}
.footer-links a{color:var(--text2);font-size:14px;text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--accent2)}
.footer-bottom{max-width:1100px;margin:32px auto 0;padding-top:24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;color:var(--text3);font-size:13px}

.fade-up{animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:900px){
  nav{padding:0 14px}
  .back-link{display:none}
}
@media(max-width:640px){
  .section{padding:72px 16px}
  .hero{padding-top:90px}
  .hero-note{font-size:13px}
  .btn-primary,.btn-secondary{width:100%;justify-content:center}
  .anchor-row{gap:8px}
  .anchor-pill{font-size:13px;padding:9px 12px}
  .cards-grid,.steps-grid,.price-grid,.timeline,.sources-grid{grid-template-columns:1fr}
  .nav-logo{letter-spacing:3px;font-size:19px}
  .lang-btn{padding:4px 7px;font-size:11px}
}
</style>
</head>
<body>
<div class="mesh-bg"></div>

<nav>
  <a href="/" class="nav-logo">VOX</a>
  <div class="nav-right">
    <a href="/" class="back-link" data-i18n="nav_back">Назад на головну</a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="uk">UA</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
    </div>
  </div>
</nav>

<main>
  <section class="hero section fade-up">
    <div class="container">
      <div class="hero-badge" data-i18n="hero_badge"></div>
      <h1 id="heroTitle"></h1>
      <p class="hero-sub" data-i18n="hero_sub"></p>
      <div class="hero-note"><strong id="noticeStrong"></strong><span id="heroNoteText"></span></div>
      <div class="hero-cta">
        <a href="#start" class="btn-primary" data-i18n="hero_cta_start"></a>
        <a href="#privacy" class="btn-secondary" data-i18n="hero_cta_privacy"></a>
      </div>
      <div class="anchor-row" id="anchorRow"></div>
    </div>
  </section>

  <section class="section fade-up" id="overview">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="overview_label"></div>
        <h2 class="section-title" data-i18n="overview_title"></h2>
        <p class="section-desc" data-i18n="overview_desc"></p>
      </div>
      <div class="cards-grid" id="overviewGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="start">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="start_label"></div>
        <h2 class="section-title" data-i18n="start_title"></h2>
        <p class="section-desc" data-i18n="start_desc"></p>
      </div>
      <div class="steps-grid" id="startGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="modes">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="modes_label"></div>
        <h2 class="section-title" data-i18n="modes_title"></h2>
        <p class="section-desc" data-i18n="modes_desc"></p>
      </div>
      <div class="cards-grid" id="modesGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="flow">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="flow_label"></div>
        <h2 class="section-title" data-i18n="flow_title"></h2>
        <p class="section-desc" data-i18n="flow_desc"></p>
      </div>
      <div class="timeline" id="flowGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="pricing">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="pricing_label"></div>
        <h2 class="section-title" data-i18n="pricing_title"></h2>
        <p class="section-desc" data-i18n="pricing_desc"></p>
      </div>
      <div class="price-grid" id="pricingGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="privacy">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="privacy_label"></div>
        <h2 class="section-title" data-i18n="privacy_title"></h2>
        <p class="section-desc" data-i18n="privacy_desc"></p>
      </div>
      <div class="notice"><strong id="privacyNoticeTitle"></strong> <span id="privacyNoticeText"></span></div>
      <div class="cards-grid" id="privacyGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="matrix">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="matrix_label"></div>
        <h2 class="section-title" data-i18n="matrix_title"></h2>
        <p class="section-desc" data-i18n="matrix_desc"></p>
      </div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead><tr id="matrixHeadRow"></tr></thead>
            <tbody id="matrixBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <section class="section fade-up" id="rights">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="rights_label"></div>
        <h2 class="section-title" data-i18n="rights_title"></h2>
        <p class="section-desc" data-i18n="rights_desc"></p>
      </div>
      <div class="cards-grid" id="rightsGrid"></div>
    </div>
  </section>

  <section class="section fade-up" id="sources">
    <div class="container">
      <div class="section-head">
        <div class="section-tag" data-i18n="sources_label"></div>
        <h2 class="section-title" data-i18n="sources_title"></h2>
        <p class="section-desc" data-i18n="sources_desc"></p>
      </div>

      <div class="sources-block">
        <div class="section-head" style="margin-bottom:24px">
          <div class="section-tag" data-i18n="sources_official_title"></div>
        </div>
        <div class="sources-grid" id="officialSources"></div>
      </div>

      <div class="sources-block">
        <div class="section-head" style="margin-bottom:24px">
          <div class="section-tag" data-i18n="sources_industry_title"></div>
        </div>
        <div class="sources-grid" id="industrySources"></div>
      </div>

      <div class="notice" style="margin-top:24px"><span data-i18n="source_notes"></span></div>
    </div>
  </section>

  <section class="section cta-section fade-up">
    <div class="cta-card">
      <div class="section-tag" data-i18n="cta_tag"></div>
      <h2 class="section-title" data-i18n="cta_title"></h2>
      <p class="section-desc" data-i18n="cta_desc"></p>
      <div class="hero-cta" style="margin-bottom:0">
        <a href="/" class="btn-primary" data-i18n="cta_primary"></a>
        <a href="/" class="btn-secondary" data-i18n="cta_secondary"></a>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-logo">VOX</div>
      <p class="footer-tagline" data-i18n="footer_tag"></p>
    </div>
    <div>
      <p style="font-weight:600;margin-bottom:12px;font-size:14px" data-i18n="footer_product"></p>
      <div class="footer-links">
        <a href="/host" data-i18n="footer_host"></a>
        <a href="/#features" data-i18n="footer_features"></a>
        <a href="/docs" data-i18n="footer_docs"></a>
      </div>
    </div>
    <div>
      <p style="font-weight:600;margin-bottom:12px;font-size:14px" data-i18n="footer_support"></p>
      <div class="footer-links">
        <a href="/docs" data-i18n="footer_docs"></a>
        <a href="mailto:privacy@your-domain.com" data-i18n="footer_contact"></a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <span>© 2026 VOX. <span data-i18n="footer_rights"></span></span>
    <span data-i18n="footer_made"></span>
  </div>

rt_desc": "This is the baseline path for a new user. Button labels may vary slightly by version, but the overall workflow stays the same.", "start_steps": [{"num": "1", "title": "Create an account", "text": "On the landing page, click sign up and enter your email, name, and password."}, {"num": "2", "title": "Verify your email", "text": "After email verification, the service adds a $3 starter bonus to the account balance."}, {"num": "3", "title": "Check your balance", "text": "Profile and dashboard areas show the current balance and an estimated number of translation minutes."}, {"num": "4", "title": "Open VOX Host", "text": "Go to the host panel, choose the working mode, and set the translation languages."}], "modes_label": "Usage modes", "modes_title": "How to use VOX in a real scenario", "modes_desc": "VOX works for personal translation and multilingual sessions. Here is the user-facing explanation of each mode.", "modes_cards": [{"icon": "🎧", "title": "Solo", "text": "One speaker and one listener. Choose source and target language, start the session, and hear the translated audio almost in real time."}, {"icon": "🏠", "title": "Room / Host", "text": "The host creates a room, shows a QR code or sends a link, and controls speaking permissions, microphones, and participants."}, {"icon": "🙋", "title": "Guest", "text": "A guest joins from a browser, selects a preferred language, listens to the translation, and can request speaking permission using a hand-raise style flow."}], "flow_label": "Practical workflow", "flow_title": "Recommended order during a live meeting", "flow_desc": "This block is suitable for a public end-user guide for someone running a multilingual session for the first time.", "flow_items": [{"title": "1. Before the session", "text": "Make sure browser microphone permission is allowed and headphones are connected if you want to avoid echo."}, {"title": "2. Create the room", "text": "In VOX Host, create a room, set the speaker language and audience languages, then open the QR code or guest link."}, {"title": "3. Let guests join", "text": "Guests scan the QR code, open the page, choose their language, and wait for the host if speaking permission is required."}, {"title": "4. Moderate the floor", "text": "The host manages the speaking queue: approves speaking, mutes, removes access, or disconnects a participant when needed."}, {"title": "5. Finish and review", "text": "After the session, close the room, review the balance, and top it up through Stripe Checkout if needed."}], "pricing_label": "Balance and pricing", "pricing_title": "What users should know about billing", "pricing_desc": "The current project documentation describes a pay-as-you-go model: no subscription, minute-based usage charging.", "pricing_cards": [{"amount": "$3", "unit": "starter bonus", "desc": "Added after email verification. A simple way to test the service without extra spend.", "badge": "After verification"}, {"amount": "$0.05", "unit": "per minute", "desc": "Base rate for the Solo scenario — personal one-to-one translation.", "badge": "Solo"}, {"amount": "$0.05 × N", "unit": "per minute × guests", "desc": "For room mode, the price scales with the number of guests receiving translation at the same time.", "badge": "Room"}], "privacy_label": "Confidential data and the EU", "privacy_title": "Rules for using confidential and personal data", "privacy_desc": "Below is a practical rule set for VOX, structured the way mature SaaS/AI services usually present privacy: what is processed, why, on which legal basis, for how long, who can access it, and what rights users have.", "privacy_notice_title": "Important", "privacy_notice_text": "This is not individual legal advice. It is a production-ready foundation for a VOX “Privacy / Confidential Data Rules” page aligned with EU expectations. Before publishing, replace placeholder contacts, real retention periods, subprocessor information, and international-transfer settings.", "privacy_cards": [{"icon": "👤", "title": "Who is controller / processor", "text": "In a typical B2B setup, the company running the meeting decides why and how meeting content is processed and therefore acts as controller. VOX and integrated providers may act as processors or subprocessors. This should be documented in the contract and DPA."}, {"icon": "📦", "title": "What data may be processed", "text": "Account data (name, email, password hash), payment-related data and transaction metadata, technical logs, live speech audio, transcripts, language settings, support data, and security logs."}, {"icon": "⚖️", "title": "Legal bases", "text": "Usually: contract performance for account, billing, and core functionality; legitimate interests for service protection and anti-fraud; consent for marketing or where consent is genuinely required; special-category data requires an additional Article 9 GDPR condition."}, {"icon": "🎯", "title": "Minimisation and purpose limitation", "text": "Collect only what is genuinely necessary for translation. Do not reuse audio, transcripts, or chat data for unrelated purposes without a clear notice and a valid legal basis."}, {"icon": "🔐", "title": "Security", "text": "Least-privilege access, MFA for admins, encryption in transit, access logging, role separation, regular access review, environment isolation, and reliable deletion procedures."}, {"icon": "🌍", "title": "Transfers outside the EEA", "text": "If infrastructure or vendors are outside the EEA, a transfer mechanism is needed: an adequacy decision or SCCs together with a transfer-risk assessment and supplementary measures where required."}], "matrix_label": "Operational rules", "matrix_title": "Allowed-use matrix for VOX data handling", "matrix_desc": "This block works well on a public user page or in a separate policy document. It turns abstract principles into operational rules for day-to-day usage.", "matrix_headers": ["Action / data", "Rule", "What to do in practice"], "matrix_rows": [["Registration, login, balance, payments", "Allowed as core service functionality.", "Provide a privacy notice, user terms, secure password-hash storage, strict access control, and statutory accounting retention where required."], ["Live audio for translation", "Allowed when necessary to provide the service and participants are properly informed.", "Before the session, show a notice explaining what is streamed, who receives the translation, whether transcripts are created, and how long they are stored."], ["Transcripts and recordings", "Store only if there is a real business or user need.", "Default to the shortest period possible or disable long-term storage by default. Give admins retention controls and deletion options."], ["Special-category data: health data, biometric data used for identification, political or religious views, etc.", "Not recommended by default.", "If unavoidable, you need not only an Article 6 GDPR basis but also an Article 9 GDPR condition, stronger access limits, and often a DPIA."], ["Support and human staff access", "Need-to-know only, minimal, and logged.", "Adopt a case-based support access policy: customer authorisation where feasible, event logging, time limits, and confidentiality obligations for staff."], ["Model training on customer content", "Do not do this silently or by default.", "If such an option exists at all, describe it explicitly, separate it from the core service, and rely on an appropriate legal basis; in B2B the best practice is opt-out / disabled by default or no training at all."], ["Minors and children’s data", "Higher-risk area.", "If the service will be used in education or with minors, check national age-of-consent rules and add dedicated notices and controls."], ["Transfers outside the EEA", "Allowed only with a valid transfer mechanism.", "Document hosting locations, vendors, SCCs / adequacy basis, and supplementary safeguards; reflect this in the privacy notice and DPA."]], "rights_label": "User rights and incidents", "rights_title": "What the user should be told about their rights", "rights_desc": "This section can stay almost unchanged in the final public documentation, apart from replacing placeholder contact details.", "rights_cards": [{"icon": "📬", "title": "Data-subject rights", "text": "Users should be able to request access, rectification, erasure, restriction, portability, objection, and information about the processing. Contact channel: [privacy@your-domain.com]."}, {"icon": "⏱️", "title": "Response time", "text": "Rights requests should be answered without undue delay and generally no later than one month. For complex requests, the period may be extended by up to two more months if the person is informed of the reason within the first month."}, {"icon": "🚨", "title": "Security incidents", "text": "If a personal-data breach occurs, the controller should assess the risk, document the incident, and where required notify the supervisory authority within 72 hours and inform affected individuals when the risk is high."}, {"icon": "🧭", "title": "DPIA and privacy by design", "text": "If the processing is likely to create high risk — for example large-scale sensitive data or systematic monitoring — a DPIA is required. Default settings should be privacy-protective: minimum data, short retention, restricted access."}], "sources_label": "Legal basis and benchmarks", "sources_title": "What this section is based on", "sources_desc": "The structure below follows official EU materials and the way mature communication / transcription services describe access, retention, model-training use, support access, and privacy controls.", "sources_official_title": "Official EU sources", "sources_industry_title": "How other services structure it", "source_notes": "Production recommendation: publish separate documents for the Privacy Notice, DPA/Subprocessor List, Retention Policy, and Incident Response Summary.", "cta_tag": "Ready to publish", "cta_title": "Now replace the placeholders with your real details", "cta_desc": "For production, replace the privacy email, legal entity name, retention periods, vendor list, and links to your DPA / Terms / Support pages.", "cta_primary": "Open VOX", "cta_secondary": "Back to home", "footer_tag": "AI Real-Time Translation Platform", "footer_product": "Product", "footer_host": "Host panel", "footer_features": "Features", "footer_support": "Support", "footer_docs": "Documentation", "footer_contact": "Contact", "footer_rights": "All rights reserved.", "footer_made": "Made with ❤️ for multilingual world"}, "de": {"lang_code": "de", "page_title": "VOX — Benutzerhandbuch und EU-Regeln für vertrauliche Daten", "nav_back": "Zurück zur Startseite", "hero_badge": "Benutzerhandbuch · Datenschutz · EU-ready", "hero_title": "VOX: Benutzerhandbuch\nund Regeln für vertrauliche Daten", "hero_sub": "Eine Seite für Endnutzer: wie man mit VOX startet, Solo- und Room-Sitzungen nutzt, Guthaben auflädt und Regeln für personenbezogene und vertrauliche Daten nach EU-Standards beschreibt.", "hero_note": "Praxisleitfaden + Policy-Vorlage. Vor der Veröffentlichung bitte Platzhalter für Kontakte, Aufbewahrungsfristen und Unterauftragsverarbeiter durch reale Angaben ersetzen.", "hero_cta_start": "Zum Schnellstart", "hero_cta_privacy": "Zu den EU-Regeln", "anchors": [["start", "Start"], ["modes", "Modi"], ["privacy", "EU-Daten"], ["sources", "Quellen"]], "overview_label": "Was diese Seite enthält", "overview_title": "Alles, was ein Nutzer braucht — ohne Swagger und API-Lärm", "overview_desc": "Diese Seite ersetzt die technische Endpunkt-Liste durch verständliche Dokumentation: was man anklickt, wie man einen Raum startet, wie Gäste beitreten und welche Regeln für Sprache, Transkripte und Zahlungsdaten gelten.", "overview_cards": [{"icon": "🚀", "title": "Schnellstart", "text": "Registrieren → E-Mail bestätigen → 3-$-Bonus erhalten → VOX Host öffnen → Übersetzung starten."}, {"icon": "🌐", "title": "Keine App für Gäste", "text": "Gäste treten per Browser über QR-Code oder Link bei und wählen einfach ihre Sprache."}, {"icon": "🛡️", "title": "EU-taugliche Regeln", "text": "Ein eigener Abschnitt unten erklärt GDPR-orientierte Prinzipien: Transparenz, Datenminimierung, Aufbewahrung, Betroffenenrechte, Sicherheit und internationale Übermittlungen."}], "start_label": "Erste Schritte", "start_title": "In wenigen Minuten loslegen", "start_desc": "Dies ist der Standardablauf für neue Nutzer. Die Bezeichnungen einzelner Buttons können je nach Version leicht variieren, die Logik bleibt aber gleich.", "start_steps": [{"num": "1", "title": "Konto anlegen", "text": "Auf der Startseite auf Registrieren klicken und E-Mail, Name und Passwort eingeben."}, {"num": "2", "title": "E-Mail bestätigen", "text": "Nach der E-Mail-Verifizierung wird dem Konto ein Startbonus von 3 $ gutgeschrieben."}, {"num": "3", "title": "Guthaben prüfen", "text": "Im Profil und im Dashboard werden das aktuelle Guthaben und die geschätzten Übersetzungsminuten angezeigt."}, {"num": "4", "title": "VOX Host öffnen", "text": "Zum Host-Panel wechseln, den Arbeitsmodus wählen und die Übersetzungssprachen festlegen."}], "modes_label": "Nutzungsmodi", "modes_title": "So wird VOX im echten Einsatz verwendet", "modes_desc": "VOX eignet sich für persönliche Übersetzung und für mehrsprachige Sitzungen. Hier ist die nutzerorientierte Erklärung der Modi.", "modes_cards": [{"icon": "🎧", "title": "Solo", "text": "Ein Sprecher und ein Zuhörer. Ausgangs- und Zielsprache wählen, Sitzung starten und die übersetzte Sprache nahezu in Echtzeit hören."}, {"icon": "🏠", "title": "Room / Host", "text": "Der Host erstellt einen Raum, zeigt einen QR-Code oder sendet einen Link und steuert Sprechrechte, Mikrofone und Teilnehmer."}, {"icon": "🙋", "title": "Gast", "text": "Ein Gast tritt per Browser bei, wählt eine bevorzugte Sprache, hört die Übersetzung und kann über einen Hand-raise-Ablauf um Sprechrecht bitten."}], "flow_label": "Praktischer Ablauf", "flow_title": "Empfohlene Reihenfolge während eines Live-Meetings", "flow_desc": "Dieser Block eignet sich als öffentliche Endnutzer-Anleitung für Personen, die erstmals eine mehrsprachige Sitzung moderieren.", "flow_items": [{"title": "1. Vor dem Start", "text": "Sicherstellen, dass das Mikrofon im Browser freigegeben ist und ggf. Kopfhörer verbunden sind, um Echo zu vermeiden."}, {"title": "2. Raum erstellen", "text": "In VOX Host einen Raum erstellen, Sprache des Sprechers und Zielsprachen festlegen und dann QR-Code oder Gast-Link öffnen."}, {"title": "3. Gäste beitreten lassen", "text": "Gäste scannen den QR-Code, öffnen die Seite, wählen ihre Sprache und warten auf Freigabe, falls Sprechrecht nötig ist."}, {"title": "4. Moderation", "text": "Der Host verwaltet die Wortmeldungen: Sprechen erlauben, stummschalten, Zugriff entziehen oder Teilnehmer trennen."}, {"title": "5. Sitzung beenden", "text": "Nach dem Meeting den Raum schließen, das Guthaben prüfen und bei Bedarf über Stripe Checkout aufladen."}], "pricing_label": "Guthaben und Abrechnung", "pricing_title": "Was Nutzer über die Bezahlung wissen sollten", "pricing_desc": "Die aktuelle Projektdokumentation beschreibt ein Pay-as-you-go-Modell: kein Abo, minutengenaue Abrechnung.", "pricing_cards": [{"amount": "$3", "unit": "Startbonus", "desc": "Wird nach der E-Mail-Bestätigung gutgeschrieben. Eine einfache Möglichkeit, den Dienst ohne Zusatzkosten zu testen.", "badge": "Nach Verifizierung"}, {"amount": "$0.05", "unit": "pro Minute", "desc": "Grundpreis für das Solo-Szenario — persönliche Eins-zu-eins-Übersetzung.", "badge": "Solo"}, {"amount": "$0.05 × N", "unit": "pro Minute × Gäste", "desc": "Im Room-Modus skaliert der Preis mit der Anzahl der Gäste, die gleichzeitig Übersetzungen empfangen.", "badge": "Room"}], "privacy_label": "Vertrauliche Daten und EU", "privacy_title": "Regeln für den Umgang mit vertraulichen und personenbezogenen Daten", "privacy_desc": "Unten finden Sie ein praxisnahes Regelwerk für VOX, aufgebaut so, wie reife SaaS/AI-Dienste Datenschutz typischerweise darstellen: was verarbeitet wird, warum, auf welcher Rechtsgrundlage, wie lange, wer Zugriff hat und welche Rechte Nutzer haben.", "privacy_notice_title": "Wichtig", "privacy_notice_text": "Dies ist keine individuelle Rechtsberatung. Es ist eine belastbare Grundlage für eine VOX-Seite „Privacy / Confidential Data Rules“ im Sinne der EU-Erwartungen. Vor Veröffentlichung bitte Platzhalter, reale Aufbewahrungsfristen, Subprozessoren und internationale Übermittlungsmechanismen ersetzen.", "privacy_cards": [{"icon": "👤", "title": "Wer ist Verantwortlicher / Auftragsverarbeiter", "text": "In einem typischen B2B-Setup entscheidet das Unternehmen, das das Meeting durchführt, über Zweck und Mittel der Verarbeitung des Meeting-Inhalts und ist damit Verantwortlicher. VOX und integrierte Anbieter können Auftragsverarbeiter oder Unterauftragsverarbeiter sein. Das sollte vertraglich und im DPA dokumentiert werden."}, {"icon": "📦", "title": "Welche Daten verarbeitet werden können", "text": "Kontodaten (Name, E-Mail, Passwort-Hash), zahlungsbezogene Daten und Transaktionsmetadaten, technische Logs, Live-Sprachaudio, Transkripte, Spracheinstellungen, Supportdaten und Sicherheitsprotokolle."}, {"icon": "⚖️", "title": "Rechtsgrundlagen", "text": "Typischerweise: Vertragserfüllung für Konto, Abrechnung und Kernfunktionalität; berechtigte Interessen für Schutz des Dienstes und Betrugsprävention; Einwilligung für Marketing oder wo Einwilligung wirklich erforderlich ist; bei besonderen Kategorien von Daten zusätzlich eine Voraussetzung nach Art. 9 DSGVO."}, {"icon": "🎯", "title": "Datenminimierung und Zweckbindung", "text": "Nur die Daten erheben, die wirklich für die Übersetzung erforderlich sind. Audio, Transkripte oder Chatdaten nicht für andere Zwecke wiederverwenden, ohne klare Information und gültige Rechtsgrundlage."}, {"icon": "🔐", "title": "Sicherheit", "text": "Least-Privilege-Zugriff, MFA für Admins, Verschlüsselung bei der Übertragung, Zugriffsprotokollierung, Rollentrennung, regelmäßige Überprüfung der Zugriffsrechte, Umgebungsisolation und verlässliche Löschprozesse."}, {"icon": "🌍", "title": "Übermittlungen außerhalb des EWR", "text": "Wenn Infrastruktur oder Anbieter außerhalb des EWR sitzen, ist ein Übermittlungsmechanismus erforderlich: Angemessenheitsbeschluss oder SCCs zusammen mit einer Transfer-Risiko-Bewertung und ggf. zusätzlichen Maßnahmen."}], "matrix_label": "Operative Regeln", "matrix_title": "Matrix für zulässige Datennutzung in VOX", "matrix_desc": "Dieser Block eignet sich gut für eine öffentliche Nutzerseite oder ein separates Policy-Dokument. Er macht aus abstrakten Grundsätzen konkrete Regeln für den täglichen Einsatz.", "matrix_headers": ["Vorgang / Daten", "Regel", "Praktische Umsetzung"], "matrix_rows": [["Registrierung, Login, Guthaben, Zahlungen", "Als Kernfunktion des Dienstes zulässig.", "Privacy Notice, Nutzungsbedingungen, sichere Speicherung von Passwort-Hashes, strenge Zugriffskontrollen und gesetzliche Aufbewahrung für Buchhaltungsdaten bereitstellen."], ["Live-Audio für Übersetzungen", "Zulässig, wenn es für die Leistungserbringung notwendig ist und die Teilnehmer ordnungsgemäß informiert werden.", "Vor der Sitzung einen Hinweis anzeigen: was gestreamt wird, wer die Übersetzung erhält, ob Transkripte erstellt werden und wie lange sie gespeichert werden."], ["Transkripte und Aufzeichnungen", "Nur speichern, wenn ein echter geschäftlicher oder nutzerbezogener Bedarf besteht.", "Standardmäßig möglichst kurze Fristen oder standardmäßig keine Langzeitspeicherung. Admins sollten Retention- und Löschoptionen erhalten."], ["Besondere Kategorien von Daten: Gesundheitsdaten, biometrische Daten zur Identifizierung, politische oder religiöse Ansichten usw.", "Standardmäßig nicht empfohlen.", "Wenn unvermeidbar, ist neben Art. 6 DSGVO auch eine Voraussetzung nach Art. 9 DSGVO erforderlich, dazu stärkere Zugriffsbeschränkungen und oft eine DPIA."], ["Support und menschlicher Zugriff durch Mitarbeitende", "Nur nach dem Need-to-know-Prinzip, minimal und protokolliert.", "Fallbezogene Support-Zugriffspolitik festlegen: Kundenfreigabe soweit machbar, Ereignisprotokollierung, Zeitbegrenzungen und Vertraulichkeitspflichten für Mitarbeitende."], ["Modelltraining auf Kundendaten", "Nicht stillschweigend und nicht standardmäßig.", "Falls eine solche Option überhaupt existiert, muss sie ausdrücklich beschrieben, vom Kerndienst getrennt und auf eine passende Rechtsgrundlage gestützt werden; im B2B ist Opt-out / standardmäßig deaktiviert oder gar kein Training Best Practice."], ["Daten Minderjähriger", "Erhöhter Risikobereich.", "Wenn der Dienst im Bildungsbereich oder mit Minderjährigen eingesetzt wird, nationale Altersgrenzen für Einwilligungen prüfen und gesonderte Hinweise sowie Kontrollen ergänzen."], ["Übermittlungen außerhalb des EWR", "Nur mit gültigem Übermittlungsmechanismus zulässig.", "Hosting-Standorte, Anbieter, SCCs / Angemessenheitsgrundlage und zusätzliche Schutzmaßnahmen dokumentieren; in Privacy Notice und DPA abbilden."]], "rights_label": "Betroffenenrechte und Vorfälle", "rights_title": "Was Nutzer über ihre Rechte lesen sollten", "rights_desc": "Dieser Abschnitt kann in der finalen öffentlichen Dokumentation fast unverändert bleiben; nur die Platzhalter-Kontakte sollten ersetzt werden.", "rights_cards": [{"icon": "📬", "title": "Betroffenenrechte", "text": "Nutzer sollten Zugang, Berichtigung, Löschung, Einschränkung, Datenübertragbarkeit, Widerspruch und Informationen zur Verarbeitung verlangen können. Kontaktkanal: [privacy@your-domain.com]."}, {"icon": "⏱️", "title": "Antwortfrist", "text": "Anfragen zu Rechten sollten unverzüglich und grundsätzlich spätestens innerhalb eines Monats beantwortet werden. Bei komplexen Anfragen kann die Frist um bis zu zwei weitere Monate verlängert werden, sofern innerhalb des ersten Monats über Grund und Verlängerung informiert wird."}, {"icon": "🚨", "title": "Sicherheitsvorfälle", "text": "Bei einer Datenschutzverletzung sollte der Verantwortliche das Risiko bewerten, den Vorfall dokumentieren und erforderlichenfalls die Aufsichtsbehörde innerhalb von 72 Stunden benachrichtigen sowie betroffene Personen bei hohem Risiko informieren."}, {"icon": "🧭", "title": "DPIA und Privacy by Design", "text": "Wenn die Verarbeitung voraussichtlich ein hohes Risiko mit sich bringt — etwa bei großflächiger Verarbeitung sensibler Daten oder systematischer Überwachung — ist eine DPIA erforderlich. Voreinstellungen sollten datenschutzfreundlich sein: minimale Daten, kurze Fristen, eingeschränkter Zugriff."}], "sources_label": "Rechtsgrundlagen und Benchmarks", "sources_title": "Worauf dieser Abschnitt basiert", "sources_desc": "Die Struktur orientiert sich an offiziellen EU-Materialien und daran, wie reife Kommunikations- und Transkriptionsdienste Zugriff, Aufbewahrung, Modelltraining, Supportzugriff und Datenschutzkontrollen beschreiben.", "sources_official_title": "Offizielle EU-Quellen", "sources_industry_title": "So strukturieren es andere Dienste", "source_notes": "Empfehlung für Produktion: separate Dokumente für Privacy Notice, DPA/Subprocessor List, Retention Policy und Incident Response Summary veröffentlichen.", "cta_tag": "Bereit zur Veröffentlichung", "cta_title": "Jetzt nur noch echte Daten statt Platzhalter eintragen", "cta_desc": "Für die Produktion bitte Privacy-E-Mail, juristische Unternehmensbezeichnung, Aufbewahrungsfristen, Anbieterliste und Links zu DPA / Terms / Support ersetzen.", "cta_primary": "VOX öffnen", "cta_secondary": "Zurück zur Startseite", "footer_tag": "KI-Echtzeit-Übersetzungsplattform", "footer_product": "Produkt", "footer_host": "Host-Panel", "footer_features": "Funktionen", "footer_support": "Support", "footer_docs": "Dokumentation", "footer_contact": "Kontakt", "footer_rights": "Alle Rechte vorbehalten.", "footer_made": "Mit ❤️ für die mehrsprachige Welt gemacht"}};

let currentLang = localStorage.getItem('vox_ui_lang') || localStorage.getItem('vox_docs_lang') || 'uk';

function t(key) {
  return (CONTENT[currentLang] && CONTENT[currentLang][key]) || (CONTENT.uk && CONTENT.uk[key]) || '';
}

function setText(selector, key) {
  document.querySelectorAll(selector).forEach(el => {
    const value = t(key);
    if (typeof value === 'string') el.textContent = value;
  });
}

function renderCards(targetId, cards) {
  const root = document.getElementById(targetId);
  root.innerHTML = cards.map(card => `
    <article class="card">
      <span class="card-icon">${card.icon}</span>
      <h3>${card.title}</h3>
      <p>${card.text}</p>
    </article>
  `).join('');
}

function renderSteps(targetId, steps) {
  const root = document.getElementById(targetId);
  root.innerHTML = steps.map(step => `
    <article class="step-card">
      <div class="step-num">${step.num}</div>
      <h3>${step.title}</h3>
      <p>${step.text}</p>
    </article>
  `).join('');
}

function renderTimeline(targetId, items) {
  const root = document.getElementById(targetId);
  root.innerHTML = items.map(item => `
    <article class="timeline-item">
      <h3>${item.title}</h3>
      <p>${item.text}</p>
    </article>
  `).join('');
}

function renderPricing(cards) {
  const root = document.getElementById('pricingGrid');
  root.innerHTML = cards.map((card, idx) => `
    <article class="price-card ${idx === 1 ? '' : idx === 0 ? '' : 'highlight'}">
      <div class="price-amount">${card.amount}</div>
      <div class="price-unit">${card.unit}</div>
      <div class="price-desc">${card.desc}</div>
      <div class="price-badge">${card.badge}</div>
    </article>
  `).join('');
}

function renderMatrix(headings, rows) {
  document.getElementById('matrixHeadRow').innerHTML = headings.map(h => `<th>${h}</th>`).join('');
  document.getElementById('matrixBody').innerHTML = rows.map(row => `
    <tr>
      <td>${row[0]}</td>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
    </tr>
  `).join('');
}

function renderSources(targetId, sources) {
  const root = document.getElementById(targetId);
  root.innerHTML = sources.map(src => `
    <article class="source-card">
      <h3>${src.title}</h3>
      <p>${src.desc[currentLang] || src.desc.uk}</p>
      <a class="source-link" href="${src.url}" target="_blank" rel="noopener noreferrer">Open source ↗</a>
    </article>
  `).join('');
}

function renderAnchors(anchors) {
  const root = document.getElementById('anchorRow');
  root.innerHTML = anchors.map(item => `
    <a class="anchor-pill" href="#${item[0]}">${item[1]}</a>
  `).join('');
}

function applyI18n() {
  const langData = CONTENT[currentLang] || CONTENT.uk;
  document.documentElement.lang = langData.lang_code || currentLang;
  document.title = langData.page_title || CONTENT.uk.page_title;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const value = t(key);
    if (typeof value === 'string') el.textContent = value;
  });

  const heroTitle = document.getElementById('heroTitle');
  heroTitle.innerHTML = (langData.hero_title || '').replace('VOX', '<span class="accent">VOX</span>');

  document.getElementById('noticeStrong').textContent = '';
  document.getElementById('heroNoteText').textContent = ' ' + langData.hero_note;
  document.getElementById('privacyNoticeTitle').textContent = langData.privacy_notice_title + ':';
  document.getElementById('privacyNoticeText').textContent = ' ' + langData.privacy_notice_text;

  renderAnchors(langData.anchors || []);
  renderCards('overviewGrid', langData.overview_cards || []);
  renderSteps('startGrid', langData.start_steps || []);
  renderCards('modesGrid', langData.modes_cards || []);
  renderTimeline('flowGrid', langData.flow_items || []);
  renderPricing(langData.pricing_cards || []);
  renderCards('privacyGrid', langData.privacy_cards || []);
  renderMatrix(langData.matrix_headers || [], langData.matrix_rows || []);
  renderCards('rightsGrid', langData.rights_cards || []);
  renderSources('officialSources', OFFICIAL_SOURCES);
  renderSources('industrySources', INDUSTRY_SOURCES);

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });

  try {
    localStorage.setItem('vox_ui_lang', currentLang);
    localStorage.setItem('vox_docs_lang', currentLang);
  } catch (e) {}
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    applyI18n();
  });
});

if (!CONTENT[currentLang]) currentLang = 'uk';
applyI18n();
</script>
</body>
</html>
